<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="utf-8">
<title>SkillHub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ground:#08090A;--s1:#16171C;--s2:#1E1F25;--s3:#26272E;
  --hair:rgba(255,255,255,.06);--hair2:rgba(255,255,255,.10);
  --txt:#F7F8F8;--txt2:#9CA3AF;--txt3:#6B7280;
  --accent:#5E6AD2;--accent2:#8B93E8;--accent-soft:rgba(94,106,210,.16);
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;--cold:#7dd3fc;
  --green-bg:rgba(74,222,128,.13);--cold-bg:rgba(125,211,252,.12);
  --r6:6px;--r12:12px;--ease:cubic-bezier(.22,1,.36,1);
}
[data-theme="light"]{
  --ground:#f6f7f9;--s1:#ffffff;--s2:#f1f2f5;--s3:#e7e9ee;
  --hair:rgba(0,0,0,.08);--hair2:rgba(0,0,0,.13);
  --txt:#1a1b1e;--txt2:#596070;--txt3:#8b909c;
  --accent:#5E6AD2;--accent2:#5E6AD2;--accent-soft:rgba(94,106,210,.12);
  --green:#16a34a;--cold:#0284c7;--green-bg:rgba(22,163,74,.10);--cold-bg:rgba(2,132,199,.10);
}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:var(--ground);color:var(--txt);font:14px/1.55 'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}.disp{font-family:'Inter Tight',sans-serif;letter-spacing:-.02em}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:6px}::-webkit-scrollbar-track{background:transparent}
.win{height:100vh;display:flex;flex-direction:column}
.titlebar{height:38px;flex:none;display:flex;align-items:center;gap:8px;padding:0 14px 0 86px;background:var(--ground);border-bottom:1px solid var(--hair);-webkit-app-region:drag;user-select:none}
.tb-title{font-size:12.5px;color:var(--txt3);font-weight:500}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;-webkit-app-region:no-drag}
.iconbtn{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--txt2);cursor:pointer;border:1px solid transparent}
.iconbtn:hover{background:var(--s2);color:var(--txt)}.iconbtn svg{width:16px;height:16px}
.body{flex:1;display:flex;min-height:0}
.side{width:212px;flex:none;background:var(--ground);border-right:1px solid var(--hair);display:flex;flex-direction:column;padding:14px 10px}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 16px}
.logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#3b45a8);display:grid;place-items:center}.logo svg{width:15px;height:15px}
.brand b{font-size:15px;font-weight:600}
.nav{display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:11px;padding:8px 9px;border-radius:var(--r6);color:var(--txt2);cursor:pointer;font-size:13.5px;font-weight:450;transition:.13s var(--ease)}
.nav a svg{width:17px;height:17px;flex:none;opacity:.85}
.nav a:hover{background:var(--s1);color:var(--txt)}
.nav a.on{background:var(--accent-soft);color:var(--txt)}.nav a.on svg{opacity:1;color:var(--accent2)}
.nav .badge{margin-left:auto;font-size:11px;background:var(--s2);color:var(--txt2);padding:1px 7px;border-radius:20px}
.side-foot{margin-top:auto;padding-top:10px;border-top:1px solid var(--hair);font-size:11.5px;color:var(--txt3);display:flex;justify-content:space-between;padding:10px 9px 2px}
.side-foot b{color:var(--txt)}
.main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--ground)}
.topbar{flex:none;padding:18px 26px 14px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--hair)}
.h1{font-size:19px;font-weight:600}.h1 small{font-size:12.5px;color:var(--txt3);font-weight:400;margin-left:9px}
.search{margin-left:auto;position:relative;width:240px}
.search input{width:100%;background:var(--s1);border:1px solid var(--hair);border-radius:var(--r6);color:var(--txt);padding:7px 11px 7px 31px;font-size:13px;outline:none;transition:.13s}
.search input:focus{border-color:var(--accent);background:var(--s2)}
.search svg{position:absolute;left:9px;top:8px;width:15px;height:15px;color:var(--txt3)}
.btn{background:var(--s2);border:1px solid var(--hair2);color:var(--txt);padding:7px 13px;border-radius:var(--r6);font-size:13px;font-weight:500;cursor:pointer;transition:.13s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;flex:none;line-height:1}
.btn svg{width:15px;height:15px;flex:none}
.btn:hover{background:var(--s3)}.btn.pri{background:var(--accent);border-color:transparent;color:#fff}.btn.pri:hover{background:#6d78d8}
.btn.sm{padding:4px 10px;font-size:12px}
.content{flex:1;overflow:auto;padding:18px 26px 40px}
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.chip{font-size:12.5px;color:var(--txt2);background:var(--s1);border:1px solid var(--hair);padding:5px 11px;border-radius:20px;cursor:pointer;transition:.12s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.chip:hover{color:var(--txt);border-color:var(--hair2)}.chip.on{background:var(--accent-soft);color:var(--txt);border-color:transparent}
.chip .n{color:var(--txt3);font-size:11px}.gdot{width:7px;height:7px;border-radius:50%;flex:none}
.sep{width:1px;height:16px;background:var(--hair);margin:0 4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:12px}
.card{background:var(--s1);border:1px solid var(--hair);border-radius:var(--r12);padding:14px 15px;cursor:pointer;transition:.15s var(--ease)}
.card:hover{border-color:var(--hair2);background:var(--s2);transform:translateY(-1px)}.card.sel{border-color:var(--accent)}
.cname{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:3px}
.cdesc{font-size:12.5px;color:var(--txt2);line-height:1.5;height:38px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin:6px 0 11px}
.tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pill{font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:5px}
.pill.global{background:var(--green-bg);color:var(--green)}.pill.demand{background:var(--s3);color:var(--txt2)}
.pill.oss{background:var(--accent-soft);color:var(--accent2)}.pill.cold{background:var(--cold-bg);color:var(--cold)}
.pill.upd{background:var(--accent-soft);color:var(--accent2)}.pill.port{background:var(--cold-bg);color:var(--cold)}.pill.local{background:var(--s3);color:var(--txt3)}.pill.ext{background:var(--cold-bg);color:var(--cold)}
.gtag{font-size:11px;color:var(--txt3);margin-left:auto}
.detail{position:fixed;top:38px;right:0;bottom:0;width:380px;background:var(--s1);border-left:1px solid var(--hair2);transform:translateX(100%);transition:.32s var(--ease);z-index:20;display:flex;flex-direction:column}
.detail.open{transform:none;box-shadow:-8px 0 40px rgba(0,0,0,.3)}
.dt-head{padding:20px 22px 16px;border-bottom:1px solid var(--hair);position:relative}
.dt-head .x{position:absolute;right:16px;top:16px;width:26px;height:26px;border-radius:6px;display:grid;place-items:center;color:var(--txt3);cursor:pointer}.dt-head .x:hover{background:var(--s3);color:var(--txt)}
.dt-name{font-size:18px;font-weight:600}
.dt-body{flex:1;overflow:auto;padding:18px 22px}
.dt-body h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin:18px 0 8px;font-weight:600}.dt-body h4:first-child{margin-top:0}
.kv{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--hair)}.kv span{color:var(--txt3)}
.md{background:var(--ground);border:1px solid var(--hair);border-radius:var(--r6);padding:12px;font-size:12px;color:var(--txt2);line-height:1.6;max-height:200px;overflow:auto;white-space:pre-wrap}
.dt-foot{flex:none;padding:14px 22px;border-top:1px solid var(--hair);display:flex;gap:9px}.dt-foot .btn{flex:1;justify-content:center}
.scrim{position:fixed;inset:38px 0 0 0;background:rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:.3s;z-index:15}.scrim.open{opacity:1;pointer-events:auto}
.section-title{font-size:13px;font-weight:600;margin:22px 0 12px;display:flex;align-items:center;gap:9px}.section-title:first-child{margin-top:0}.section-title .c{font-size:11.5px;color:var(--txt3);font-weight:400}
/* 项目 */
.proj-bar{background:var(--s1);border:1px solid var(--hair);border-radius:var(--r12);padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px}
.proj-bar .pp-ic{width:36px;height:36px;border-radius:9px;background:var(--s3);display:grid;place-items:center;color:var(--txt2)}
.proj-bar b{font-size:14px}.proj-bar p{font-size:12px;color:var(--txt3);margin-top:2px}
.recent{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin:6px 0 4px}.recent .lbl{font-size:12px;color:var(--txt3)}
.recent i{font-style:normal;font-size:12.5px;color:var(--txt2);background:var(--s1);border:1px solid var(--hair);padding:5px 11px;border-radius:6px;cursor:pointer}.recent i:hover{border-color:var(--accent);color:var(--txt)}.recent i.on{background:var(--accent-soft);color:var(--txt);border-color:var(--accent)}
.addlist{display:flex;flex-direction:column;gap:1px}
.addrow{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:var(--r6);transition:.1s}.addrow:hover{background:var(--s1)}
.addrow .an{font-size:13.5px;font-weight:500}.addrow .ad{font-size:12px;color:var(--txt3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.add-tog{width:24px;height:24px;border-radius:6px;border:1px solid var(--hair2);display:grid;place-items:center;cursor:pointer;color:var(--txt2);flex:none}
.add-tog:hover{border-color:var(--accent);color:var(--accent2)}.add-tog.on{background:var(--accent);border-color:var(--accent);color:#fff}
.lochips{display:flex;gap:7px;flex-wrap:wrap}.lochip{font-size:12px;background:var(--s1);border:1px solid var(--hair);border-radius:20px;padding:5px 12px;cursor:pointer;color:var(--txt2)}.lochip:hover{border-color:var(--accent);color:var(--txt)}.lochip b{color:var(--txt);font-weight:600;text-transform:capitalize}.lochip span{color:var(--txt3);margin-left:4px}
/* 更新 */
.up-row{display:flex;align-items:center;gap:14px;padding:13px 15px;background:var(--s1);border:1px solid var(--hair);border-radius:var(--r12);margin-bottom:9px}
.st{width:9px;height:9px;border-radius:50%;flex:none}.st.green{background:var(--green)}.st.yellow{background:var(--yellow)}.st.idle{background:var(--s3)}
.up-row .un{font-size:13.5px;font-weight:500;min-width:170px}.up-row .urepo{font-size:11.5px;color:var(--txt3);flex:1}.up-row .ustat{font-size:11.5px;font-weight:500}.us-green{color:var(--green)}.us-yellow{color:var(--yellow)}.us-idle{color:var(--txt3)}
.note{font-size:11.5px;color:var(--txt3);background:var(--s1);border:1px solid var(--hair);border-radius:var(--r6);padding:8px 12px;margin-bottom:14px}
/* 统计 */
.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:6px}
.sc{background:var(--s1);border:1px solid var(--hair);border-radius:var(--r12);padding:16px}.sc .v{font-size:26px;font-weight:600;font-family:'Inter Tight'}.sc .l{font-size:12px;color:var(--txt3);margin-top:3px}.sc .v.cold{color:var(--cold)}
.tbl{width:100%;border-collapse:collapse;margin-top:6px}.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--txt3);font-weight:600;padding:8px 12px;border-bottom:1px solid var(--hair)}.tbl td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--hair)}.tbl tr:hover td{background:var(--s1)}
/* 设置 */
.set-row{display:flex;align-items:center;gap:16px;padding:15px 2px;border-bottom:1px solid var(--hair)}.set-row .si{flex:1}.set-row .si b{font-size:13.5px;font-weight:500}.set-row .si p{font-size:12px;color:var(--txt3);margin-top:2px}.set-row .sv{font-size:12.5px;color:var(--txt2);font-family:'JetBrains Mono'}
.toggle{width:38px;height:22px;border-radius:20px;background:var(--s3);position:relative;cursor:pointer;flex:none;transition:.15s}.toggle.on{background:var(--accent)}.toggle i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.18s var(--ease)}.toggle.on i{left:18px}
.empty{color:var(--txt3);padding:48px;text-align:center}
.btn.danger{background:transparent;border-color:rgba(248,113,113,.4);color:var(--red)}.btn.danger:hover{background:rgba(248,113,113,.12)}
.us-update{color:var(--yellow)}.us-ok{color:var(--green)}.us-err{color:var(--red)}
.gsec{margin-top:16px;border-top:1px solid var(--hair);padding-top:6px}.gsec summary{cursor:pointer;font-size:12.5px;color:var(--txt3);padding:8px 0;list-style:none}.gsec summary::-webkit-details-marker{display:none}.gsec summary:hover{color:var(--txt2)}
.inrow{display:flex;gap:8px;align-items:center;margin-top:8px}.inp{flex:1;background:var(--s1);border:1px solid var(--hair2);border-radius:var(--r6);color:var(--txt);padding:7px 11px;font-size:12.5px;font-family:'JetBrains Mono';outline:none}.inp:focus{border-color:var(--accent)}
.onboard{max-width:540px;margin:14px auto;text-align:center}.onboard h2{font-size:19px;margin-bottom:8px}.onboard>p{font-size:13px;color:var(--txt3);margin-bottom:18px}.card2{background:var(--s1);border:1px solid var(--hair);border-radius:var(--r12);padding:18px;text-align:left;margin-bottom:12px}.card2>b{font-size:14px}.card2>p{font-size:12.5px;color:var(--txt3);margin:6px 0 12px}
.rm{width:24px;height:24px;border-radius:6px;border:1px solid var(--hair2);display:grid;place-items:center;cursor:pointer;color:var(--txt2);flex:none}.rm:hover{border-color:var(--red);color:var(--red)}.rm svg{width:14px;height:14px}
.actbtn{font-size:11.5px;padding:3px 9px;border-radius:5px;border:1px solid var(--hair2);background:transparent;color:var(--txt2);cursor:pointer;margin-left:6px}.actbtn:hover{border-color:var(--accent);color:var(--accent2)}.actbtn.danger:hover{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div class="win">
  <div class="titlebar">
    <span class="tb-title disp">SkillHub</span>
    <div class="tb-right">
      <div class="iconbtn" id="themeBtn" title="切换主题"></div>
    </div>
  </div>
  <div class="body">
    <aside class="side">
      <div class="brand"><div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2l3 6 6 .8-4.5 4.2 1.2 6L12 16l-5.7 3 1.2-6L3 8.8 9 8z" fill="#fff" opacity=".95"/></svg></div><b class="disp">SkillHub</b></div>
      <nav class="nav" id="nav"></nav>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="h1 disp" id="title"></div>
        <div class="search" id="searchBox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="search" placeholder="搜索…"></div>
      </div>
      <div class="content" id="content"><div class="empty">加载中…</div></div>
    </main>
  </div>
</div>
<div class="scrim" id="scrim"></div>
<div class="detail" id="detail"></div>
<script>
const $=id=>document.getElementById(id);
const IC={grid:'<rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>',
folder:'<path d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>',
refresh:'<path d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5"/>',chart:'<path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>',
gear:'<circle cx="12" cy="12" r="3"/><path d="M19.4 13a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V19a2 2 0 1 1-4 0a1.6 1.6 0 0 0-2.7-1.1l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4 13a2 2 0 1 1 0-4a1.6 1.6 0 0 0 1.1-2.7l-.1-.1A2 2 0 1 1 7.7 3.4l.1.1A1.6 1.6 0 0 0 10 4V4a2 2 0 1 1 4 0a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.6 1.6 0 0 0 20 9a2 2 0 1 1 0 4z"/>',
sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/>',
moon:'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>',plus:'<path d="M12 5v14M5 12h14"/>',check:'<path d="M20 6L9 17l-5-5"/>'};
const svg=(k,w=2)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${w}">${IC[k]}</svg>`;
const GCOLOR={tools:'#5E6AD2',utils:'#9CA3AF','web-creative':'#f0a868',media:'#e879a6',jarvis:'#4ade80',workbuddy:'#38bdf8',xhs:'#f87171',contracts:'#a78bfa',lark:'#34d399',external:'#8B93E8'};
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const TITLES={catalog:['技能目录','浏览 · 搜索 · 分层'],projects:['项目装配','选项目,逐个装 skill'],updates:['更新管理','开源 skill upstream 跟踪'],stats:['用量统计','久未使用排在最前'],settings:['设置','']};
let HUB=null;const S={view:'catalog',q:'',tier:'all',group:'all',sel:null,proj:null,projInstalled:[],upd:null};
const api=window.skapi;

// 主题
function setTheme(t){document.documentElement.dataset.theme=t;localStorage.setItem('theme',t);
  $('themeBtn').innerHTML=svg(t==='dark'?'sun':'moon');if(api)api.setTheme(t);}
$('themeBtn').onclick=()=>setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
setTheme(localStorage.getItem('theme')||'dark');

// 导航
function buildNav(){const items=[['catalog','grid','技能目录',HUB?HUB.skills.length:''],['projects','folder','项目装配',''],['updates','refresh','更新管理',HUB?HUB.skills.filter(s=>s.oss).length:''],['stats','chart','用量统计',''],['settings','gear','设置','']];
  $('nav').innerHTML=items.map(([v,ic,t,b])=>`<a data-v="${v}" class="${S.view===v?'on':''}">${svg(ic)}<span>${t}</span>${b!==''?`<span class="badge">${b}</span>`:''}</a>`).join('');}
$('nav').onclick=e=>{const a=e.target.closest('a[data-v]');if(!a)return;S.view=a.dataset.v;S.sel=null;closeDetail();
  $('searchBox').style.display=(S.view==='catalog'||S.view==='projects')?'block':'none';buildNav();render();};
$('search').oninput=e=>{S.q=e.target.value.toLowerCase();render();};

let CFG=null;
async function load(){
  if(!api){$('content').innerHTML='<div class="empty">请在 SkillHub 应用内运行(需要主进程提供数据)。</div>';return;}
  CFG=await api.getConfig();
  if(!CFG.hasRegistry){renderOnboard();return;}
  try{HUB=await api.getData();HUB._recent=await api.recentProjects();}catch(e){HUB=null;}
  if(!HUB){$('content').innerHTML='<div class="empty">读取 hub 失败:'+esc(CFG.hubPath)+'</div>';return;}
  buildNav();render();
}
// 首次使用 / 没连 hub:克隆团队 hub 或指向本地已有 hub
function renderOnboard(){
  $('title').innerHTML='欢迎使用 SkillHub';$('searchBox').style.display='none';$('nav').innerHTML='';
  $('content').innerHTML=`<div class="onboard"><h2 class="disp">还没有连接 skill hub</h2>
   <p>hub 是一个 git 仓库,集中管理你/团队的全部 skill。选一种方式开始:</p>
   <div class="card2"><b>① 克隆团队 hub</b><p>团队/导师给你一个 git 地址,克隆到本地就能用同一套 skill。</p>
     <div class="inrow"><input class="inp" id="obUrl" placeholder="git@github.com:org/skill-hub.git"></div>
     <div class="inrow"><input class="inp" id="obDest" value="~/skills"><button class="btn pri" id="obClone">克隆并连接</button></div>
     <div id="obMsg" style="font-size:12px;color:var(--txt3);margin-top:8px"></div></div>
   <div class="card2"><b>② 指向本地已有 hub</b><p>本机已经有一个 skill hub 目录,直接选中它。</p>
     <button class="btn" id="obPick">${svg('folder')}选择目录…</button></div></div>`;
  $('obClone').onclick=async()=>{const u=$('obUrl').value.trim(),d=$('obDest').value.trim()||'~/skills';if(!u){$('obMsg').textContent='请填 git 地址';return;}$('obMsg').textContent='克隆中…(取决于仓库大小)';const r=await api.cloneHub(u,d);if(r.ok){HUB=null;load();}else $('obMsg').innerHTML='<span style="color:var(--red)">✗ '+esc(r.err)+'</span>';};
  $('obPick').onclick=async()=>{const p=await api.pickProject();if(!p)return;try{await api.setHubPath(p);HUB=null;load();}catch(e){$('obMsg')&&($('obMsg').textContent='');alert(String(e.message||e));}};
}
function render(){const t=TITLES[S.view];$('title').innerHTML=t[0]+(t[1]?` <small>${t[1]}</small>`:'');
  $('content').innerHTML=({catalog:catalogView,projects:projectsView,updates:updatesView,stats:statsView,settings:settingsView})[S.view]();
  if(S.view==='settings')fillSettings();}
const tierPill=s=>s.tier==='global'?'<span class="pill global">常驻</span>':'<span class="pill demand">按需</span>';
const UCH={github:['可更新','upd'],'manual-port':['手工译','port'],local:['本地','local'],'lark-cli':['lark-cli','port'],'npx-skills':['npx skills','port'],external:['外部','local']};
const updPill=s=>{const u=UCH[(s.update||{}).channel];return u?`<span class="pill ${u[1]}">${u[0]}</span>`:'';};
const extPill=s=>s.external?'<span class="pill ext">外部托管</span>':'';
const matchQ=s=>!S.q||s.name.toLowerCase().includes(S.q)||(s.desc||'').toLowerCase().includes(S.q);

// 目录
function catalogView(){
  const groups=HUB.stats.groups;
  const gc=groups.map(g=>`<span class="chip ${S.group===g?'on':''}" data-g="${g}"><span class="gdot" style="background:${GCOLOR[g]||'#888'}"></span>${g}<span class="n">${HUB.skills.filter(x=>x.group===g).length}</span></span>`).join('');
  const list=HUB.skills.filter(s=>(S.tier==='all'||s.tier===S.tier)&&(S.group==='all'||s.group===S.group)&&matchQ(s)).sort((a,b)=>a.name.localeCompare(b.name));
  const cards=list.map(s=>`<div class="card ${S.sel===s.name?'sel':''}" data-name="${s.name}">
    <div class="cname"><span class="gdot" style="background:${GCOLOR[s.group]||'#888'}"></span>${s.name}</div>
    <div class="cdesc">${esc(s.desc)||'—'}</div>
    <div class="tags">${tierPill(s)}${extPill(s)}${updPill(s)}${cold(s)&&!s.external?`<span class="pill cold">${s.lastUsed===null?'未用过':'冷'+s.lastUsed+'天'}</span>`:''}<span class="gtag">${s.group}</span></div></div>`).join('');
  return `<div class="filters">
    <span class="chip ${S.tier==='all'?'on':''}" data-t="all">全部<span class="n">${HUB.skills.length}</span></span>
    <span class="chip ${S.tier==='global'?'on':''}" data-t="global">常驻<span class="n">${HUB.stats.global}</span></span>
    <span class="chip ${S.tier==='on-demand'?'on':''}" data-t="on-demand">按需<span class="n">${HUB.skills.length-HUB.stats.global}</span></span>
    <span class="sep"></span><span class="chip ${S.group==='all'?'on':''}" data-g="all">全部分组</span>${gc}</div>
    <div class="grid">${cards||'<div class="empty">没有匹配的 skill</div>'}</div>`;
}
const cold=s=>s.lastUsed===null||s.lastUsed>=90;

// 详情
async function openDetail(name){const s=HUB.skills.find(x=>x.name===name);S.sel=name;render();
  const md=api?esc((await api.readSkillMd(name)).slice(0,1200)):'';
  $('detail').innerHTML=`<div class="dt-head"><div class="x" onclick="closeDetail()">${svg('plus').replace('M12 5v14M5 12h14','M6 6l12 12M18 6L6 18')}</div>
    <div class="dt-name disp"><span class="gdot" style="background:${GCOLOR[s.group]};display:inline-block;margin-right:8px"></span>${s.name}</div>
    <div class="tags" style="margin-top:10px">${tierPill(s)}${extPill(s)}${updPill(s)}<span class="gtag" style="margin-left:0">${s.group}</span></div></div>
   <div class="dt-body"><h4>描述</h4><div style="font-size:13px;line-height:1.6">${esc(s.desc)}</div>
    <h4>属性</h4>
    <div class="kv"><span>分层</span><b>${s.tier==='global'?'常驻 global':'按需 on-demand'}</b></div>
    <div class="kv"><span>分发 agent</span><b>${(s.agents||[]).join(' · ')}</b></div>
    ${s.oss?`<div class="kv"><span>upstream</span><b class="mono" style="font-size:11px;cursor:pointer;color:var(--accent2)" onclick="api&&api.openRepo('${s.repo}')">${s.repo.replace('github.com/','')}</b></div>`:''}
    <div class="kv"><span>最近使用</span><b>${s.lastUsed===null?'未用过':s.lastUsed+' 天前'}</b></div>
    <h4>更新来源</h4>
    <div class="kv"><span>渠道</span><b>${({github:'GitHub · 可自动更新',['manual-port']:'手工移植 · 需人工',local:'本地自制'})[(s.update||{}).channel]||'—'}</b></div>
    ${s.update&&s.update.source&&s.update.source!=='self'?`<div class="kv"><span>来源</span><b class="mono" style="font-size:11px;color:${s.update.channel==='github'?'var(--accent2)':'var(--txt2)'};max-width:230px;text-align:right;word-break:break-all">${esc(s.update.source)}</b></div>`:''}
    ${s.update?`<div class="kv"><span>如何更新</span><b style="font-size:11px;font-weight:400;text-align:right;max-width:230px;line-height:1.5">${esc(s.update.how)}</b></div>`:''}
    <h4>SKILL.md</h4><div class="md">${md||'—'}</div></div>
   <div class="dt-foot">${s.external?`<div style="font-size:11.5px;color:var(--txt3);line-height:1.5;padding:2px">外部托管 · 此处只读。更新/卸载请用 <b class="mono" style="color:var(--txt2)">${esc((s.update||{}).how||'')}</b></div>`:`<button class="btn ${s.tier==='global'?'':'pri'}" onclick="toggleTier('${s.name}')">${s.tier==='global'?'转为按需':'设为常驻'}</button><button class="btn danger" onclick="delSkill('${s.name}')">删除</button>`}</div>`;
  $('detail').classList.add('open');$('scrim').classList.add('open');}
function closeDetail(){$('detail').classList.remove('open');$('scrim').classList.remove('open');if(S.sel){S.sel=null;render();}}
$('scrim').onclick=closeDetail;
async function toggleTier(name){const s=HUB.skills.find(x=>x.name===name);if(!s||s.external)return;if(api)await api.setTier(name,s.tier==='global'?'on-demand':'global');HUB=await api.getData();closeDetail();buildNav();render();}
async function delSkill(name){const s=HUB.skills.find(x=>x.name===name);if(!s||s.external)return;if(!confirm('删除 '+name+'?\n会移除该 skill 目录及其在 claude/codex/cursor 的所有软链,不可撤销。\n(改动需到「设置」里 git push 才同步到团队)'))return;if(api)await api.deleteSkill(name);HUB=await api.getData();closeDetail();buildNav();render();}

// 项目:选项目 → 逐个装
async function pickProject(){if(!api)return;const p=await api.pickProject();if(p)selectProject(p);}
async function selectProject(p){S.proj=p;S.projInstalled=api?await api.projectInfo(p):[];render();}
function projectsView(){
  const recent=(HUB._recent||[]);
  const recentChips=recent.length?`<div class="recent"><span class="lbl">最近:</span>${recent.map(p=>`<i class="${S.proj===p?'on':''}" data-proj="${esc(p)}">${esc(p.split('/').pop())}</i>`).join('')}</div>`:'';
  const bar=`<div class="proj-bar"><div class="pp-ic">${svg('folder')}</div>
    <div style="flex:1">${S.proj?`<b class="mono">${esc(S.proj)}</b><p>已装 ${S.projInstalled.length} 个 · 软链进 .claude / .codex / .cursor</p>`:'<b>未选择项目</b><p>选一个项目目录,然后逐个装 skill</p>'}</div>
    <button class="btn" id="pickBtn">${svg('folder')}选择目录…</button></div>${recentChips}`;
  if(!S.proj)return bar+'<div class="empty">先选一个项目 ↑</div>';
  const inst=new Set(S.projInstalled);
  const row=(s,on)=>`<div class="addrow"><span class="gdot" style="background:${GCOLOR[s.group]}"></span>
    <span class="an">${s.name}</span><span class="ad">${esc(s.desc)}</span>
    <div class="add-tog ${on?'on':''}" data-add="${s.name}">${on?svg('check'):svg('plus')}</div></div>`;
  const installed=HUB.skills.filter(s=>inst.has(s.name)&&matchQ(s)).sort((a,b)=>a.name.localeCompare(b.name));
  const avail=HUB.skills.filter(s=>s.tier==='on-demand'&&!inst.has(s.name)&&matchQ(s)).sort((a,b)=>a.name.localeCompare(b.name));
  const globals=HUB.skills.filter(s=>s.tier==='global').sort((a,b)=>a.name.localeCompare(b.name));
  const los=Object.entries(HUB.loadouts).map(([n,m])=>`<span class="lochip" data-lo="${n}"><b>${n}</b><span>+${m.length}</span></span>`).join('');
  const instBlock=installed.length?`<div class="section-title">本项目已装 <span class="c">${installed.length} 个 · 你加的 · 点 ✓ 移除</span></div><div class="addlist">${installed.map(s=>row(s,true)).join('')}</div>`:'';
  const grows=globals.map(s=>`<div class="addrow inherited"><span class="gdot" style="background:${GCOLOR[s.group]}"></span><span class="an">${s.name}</span><span class="ad">${esc(s.desc)}</span><span class="pill global">自带</span></div>`).join('');
  return bar+`<div class="section-title">快捷套装 <span class="c">一键装一整组</span></div><div class="lochips">${los}</div>
    ${instBlock}
    <div class="section-title">可添加 <span class="c">${avail.length} 个按需 skill</span></div><div class="addlist">${avail.map(s=>row(s,false)).join('')||'<div class="empty">没有更多可加的</div>'}</div>
    <details class="gsec"><summary>▸ 常驻 · 所有项目自带,无需单独装(${globals.length})</summary><div class="addlist">${grows}</div></details>`;
}
async function addSkill(name,on){if(api)await api.useInProject(name,S.proj,on);S.projInstalled=await api.projectInfo(S.proj);render();}
async function addLoadout(n){const m=HUB.loadouts[n]||[];for(const x of m){if(api)await api.useInProject(x,S.proj,true);}S.projInstalled=await api.projectInfo(S.proj);render();}

// 更新
async function runCheck(){const b=$('checkBtn');if(b){b.disabled=true;b.textContent='检查中…';}try{S.upd=await api.checkUpdates();}catch(e){S.upd=[];}render();}
function updatesView(){const oss=HUB.skills.filter(s=>s.oss).sort((a,b)=>a.name.localeCompare(b.name));
  const upd=S.upd,get=n=>upd&&upd.find(x=>x.name===n);
  const stat=s=>{const u=get(s.name);if(!upd)return'<span class="ustat us-idle">已登记 · 等每周检查</span>';if(!u)return'<span class="ustat us-idle">—</span>';if(u.error)return'<span class="ustat us-err">检查失败:'+esc(u.error)+'</span>';return u.hasUpdate?`<span class="ustat us-update">有更新 → ${u.latest}</span>`:'<span class="ustat us-ok">已最新</span>';};
  const rows=oss.map(s=>`<div class="up-row"><span class="st ${(get(s.name)||{}).hasUpdate?'yellow':'idle'}"></span><span class="un">${s.name}</span><span class="urepo mono">${s.repo.replace('github.com/','')}</span>${stat(s)}</div>`).join('');
  const n=upd?upd.filter(x=>x.hasUpdate).length:null,err=upd?upd.filter(x=>x.error).length:0;
  return `<div class="note" style="display:flex;align-items:center;gap:12px"><span style="flex:1">每周一 10:00 自动检查 upstream → 按 UPDATE_POLICY 判定 <b style="color:var(--green)">green</b> 自动更 / <b style="color:var(--yellow)">yellow</b> 待定 / <b style="color:var(--red)">red</b> 拒,飞书通知。下面可手动「立即检查」(只比对 sha,不自动改文件)。${n!==null?` <b style="color:var(--yellow)">本次 ${n} 个有更新</b>${err?` · ${err} 个失败(需 gh 登录)`:''}`:''}</span><button class="btn pri sm" id="checkBtn">立即检查</button></div>
    <div class="section-title">开源 skill <span class="c">${oss.length} 个跟踪中</span></div>${rows}`;}

// 统计:久未使用排最前
function statsView(){
  const hub=HUB.skills.filter(s=>!s.external);
  const sorted=[...hub].sort((a,b)=>{const av=a.lastUsed===null?1e9:a.lastUsed,bv=b.lastUsed===null?1e9:b.lastUsed;return bv-av;});
  const coldN=hub.filter(cold).length;
  return `<div class="note">用量从 PostToolUse hook 启用起累计。久未使用 / 未用过排在最前 → 删除候选,可直接在右侧「转按需 / 删除」。删除改动需到设置里 git push 才同步团队。${HUB.stats.external?`<br>另有 <b>${HUB.stats.external}</b> 个外部托管常驻 skill(lark-cli),不计入用量统计、此处不可删。`:''}</div>
   <div class="stat-cards">
    <div class="sc"><div class="v">${hub.length}</div><div class="l">本仓库 skill</div></div>
    <div class="sc"><div class="v">${hub.filter(s=>s.tier==='global').length}</div><div class="l">常驻 global</div></div>
    <div class="sc"><div class="v cold">${coldN}</div><div class="l">冷门(≥90天/未用)</div></div>
    <div class="sc"><div class="v">${HUB.stats.oss}</div><div class="l">开源跟踪</div></div></div>
   <table class="tbl"><thead><tr><th>Skill</th><th>分组</th><th>最近使用</th><th>分层</th><th style="text-align:right">操作</th></tr></thead><tbody>
   ${sorted.slice(0,30).map(s=>`<tr><td><span class="gdot" style="background:${GCOLOR[s.group]};display:inline-block;margin-right:8px"></span>${s.name}</td><td style="color:var(--txt3)">${s.group}</td><td style="color:${cold(s)?'var(--cold)':'var(--txt2)'}">${s.lastUsed===null?'未用过':s.lastUsed+' 天前'}</td><td>${s.tier==='global'?'常驻':'按需'}</td><td style="text-align:right;white-space:nowrap"><button class="actbtn" onclick="quickTier('${s.name}')">${s.tier==='global'?'转按需':'设常驻'}</button><button class="actbtn danger" onclick="delSkill('${s.name}')">删除</button></td></tr>`).join('')}
   </tbody></table>`;}
async function quickTier(name){const s=HUB.skills.find(x=>x.name===name);if(!s||s.external)return;if(api)await api.setTier(name,s.tier==='global'?'on-demand':'global');HUB=await api.getData();buildNav();render();}

// 设置
function settingsView(){
  return `<div style="max-width:680px">
   <div class="set-row"><div class="si"><b>Hub 路径</b><p>集中管理 skill 的本地 git 仓库;换机/团队成员各自指向自己的克隆</p></div><span class="sv">${esc(CFG?CFG.hubPath:'~/skills')}</span><button class="btn sm" id="changeHub">更换…</button></div>
   <div class="set-row" style="border:0;padding-bottom:4px"><div class="si"><b>GitHub 远端 origin</b><p>跨设备 / 团队同步的 git 地址。「验证」会用 git ls-remote 确认你有访问权限</p></div></div>
   <div class="inrow"><input class="inp" id="remoteInp" placeholder="加载中…"><button class="btn sm" id="saveRemote">保存</button><button class="btn sm" id="valRemote">验证</button></div>
   <div id="remoteMsg" style="font-size:12px;color:var(--txt3);margin:8px 0 4px"></div>
   <div class="set-row"><div class="si"><b>同步</b><p>拉取团队最新(git pull --ff-only)并重新分发常驻 skill · 或推送我的改动</p></div><button class="btn sm" id="pullBtn">⤓ 拉取</button><button class="btn sm pri" id="pushBtn">↥ 推送</button></div>
   <div id="syncMsg" style="font-size:12px;color:var(--txt3);margin:8px 0 4px"></div><div id="pushMsg" style="font-size:12px;color:var(--txt3)"></div>
   <div class="set-row"><div class="si"><b>每周自动更新</b><p>周一 10:00 headless 判定 OSS upstream(launchd + skill-update-bot)</p></div><span class="sv">launchd</span></div>
   <div class="set-row"><div class="si"><b>飞书通知</b><p>更新周报推送</p></div><span class="sv">lark-cli</span></div>
   </div>`;}
async function fillSettings(){const i=$('remoteInp');if(!i||!api)return;const r=await api.getRemote();i.value=r||'';i.placeholder='git@github.com:org/skill-hub.git';}

// 事件委托
$('content').onclick=async e=>{
  const t=e.target;
  const card=t.closest('.card[data-name]');if(card)return openDetail(card.dataset.name);
  const c=t.closest('.chip[data-t]');if(c){S.tier=c.dataset.t;return render();}
  const g=t.closest('.chip[data-g]');if(g){S.group=g.dataset.g;return render();}
  if(t.closest('#pickBtn'))return pickProject();
  const rp=t.closest('i[data-proj]');if(rp)return selectProject(rp.dataset.proj);
  const ad=t.closest('.add-tog[data-add]');if(ad)return addSkill(ad.dataset.add,!ad.classList.contains('on'));
  const lo=t.closest('.lochip[data-lo]');if(lo)return addLoadout(lo.dataset.lo);
  if(t.closest('#checkBtn'))return runCheck();
  if(t.closest('#changeHub')){const p=await api.pickProject();if(!p)return;try{await api.setHubPath(p);HUB=null;S.upd=null;load();}catch(e){alert(String(e.message||e));}return;}
  if(t.closest('#saveRemote')){const u=$('remoteInp').value.trim();if(!u)return;$('remoteMsg').textContent='保存中…';const r=await api.setRemote(u);$('remoteMsg').innerHTML=r.ok?'✓ 已保存':'<span style="color:var(--red)">✗ '+esc(r.err)+'</span>';return;}
  if(t.closest('#valRemote')){$('remoteMsg').textContent='验证中…';const r=await api.validateRemote();$('remoteMsg').innerHTML=r.ok?'<span style="color:var(--green)">✓ 可访问,有权限</span>':'<span style="color:var(--red)">✗ 无法访问:'+esc(r.err)+'</span>';return;}
  if(t.closest('#pullBtn')){$('syncMsg').textContent='拉取中…';const r=await api.gitPull();$('syncMsg').innerHTML=r.ok?'✓ 已同步:'+esc(r.msg):'<span style="color:var(--red)">✗ '+esc(r.msg)+'</span>';if(r.ok){HUB=await api.getData();buildNav();}return;}
  if(t.closest('#pushBtn')){$('pushMsg').textContent='推送中…';const r=await api.gitPush();$('pushMsg').innerHTML=r.ok?'✓ 已推送':'<span style="color:var(--red)">✗ '+esc(r.msg)+'</span>';}
};
load();
</script>
</body>
</html>
