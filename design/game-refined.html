<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillHub · 技能装备库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ground:#0A0B0E;--s1:#141519;--s2:#1B1C22;--s3:#23242B;--s4:#2C2D35;
  --hair:rgba(255,255,255,.06);--hair2:rgba(255,255,255,.11);--hair3:rgba(255,255,255,.16);
  --txt:#F4F5F7;--txt2:#A3A8B5;--txt3:#6B7080;--txt4:#494E5C;
  --accent:#6E78D6;--accent2:#9aa2ee;--accent-soft:rgba(110,120,214,.14);
  /* 来源色(中性,不分高下,只做安静标识) */
  --src-gh:#54B8AC;       /* GitHub  青 */
  --src-self:#C99A63;     /* 自制    暖琥珀 */
  --src-web:#7CB36B;      /* 网站    绿 */
  --warn:#E0A14B;--up:#E8C44D;
  --r6:7px;--r10:10px;--r14:14px;--ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:var(--ground);color:var(--txt);font:14px/1.55 'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.disp{font-family:'Inter Tight',sans-serif;letter-spacing:-.02em}.mono{font-family:'JetBrains Mono',monospace}
svg{display:block}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:6px}::-webkit-scrollbar-thumb:hover{background:var(--s4)}::-webkit-scrollbar-track{background:transparent}
/* 极轻氛围:一层几乎不可见的顶光,不抢内容 */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(900px 460px at 78% -8%,rgba(110,120,214,.10),transparent 70%);}
.app{position:relative;z-index:1;height:100vh;display:flex}

/* 左栏 */
.rail{width:216px;flex:none;border-right:1px solid var(--hair);display:flex;flex-direction:column;padding:16px 12px;background:linear-gradient(180deg,rgba(255,255,255,.012),transparent)}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px}
.brand .mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(145deg,var(--accent),#444db0);display:grid;place-items:center;box-shadow:0 4px 14px rgba(110,120,214,.35)}
.brand .mark svg{width:15px;height:15px;color:#fff}
.brand b{font-size:15px;font-weight:600}
.nav{display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:var(--r6);color:var(--txt2);cursor:pointer;font-size:13.5px;font-weight:450;transition:.14s var(--ease)}
.nav a svg{width:17px;height:17px;flex:none;opacity:.8;color:var(--txt2)}
.nav a:hover{background:var(--s1);color:var(--txt)}
.nav a.on{background:var(--accent-soft);color:var(--txt)}.nav a.on svg{opacity:1;color:var(--accent2)}
.nav a .ct{margin-left:auto;font-size:11px;color:var(--txt3);font-variant-numeric:tabular-nums}
.rail .foot{margin-top:auto;padding:10px 8px 2px;border-top:1px solid var(--hair);font-size:11px;color:var(--txt3);line-height:1.6}

/* 主区 */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{flex:none;display:flex;align-items:center;gap:16px;padding:18px 28px 14px;border-bottom:1px solid var(--hair)}
.top h1{font-size:19px;font-weight:600}.top h1 small{font-size:12.5px;color:var(--txt3);font-weight:400;margin-left:10px}
.search{margin-left:auto;position:relative;width:230px}
.search input{width:100%;background:var(--s1);border:1px solid var(--hair);border-radius:var(--r6);color:var(--txt);padding:7px 11px 7px 32px;font-size:13px;outline:none;transition:.14s}
.search input:focus{border-color:var(--accent);background:var(--s2)}
.search svg{position:absolute;left:10px;top:8px;width:15px;height:15px;color:var(--txt3)}
.scroll{flex:1;overflow:auto;padding:20px 28px 48px}

/* 过滤条 */
.filters{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--txt2);background:var(--s1);border:1px solid var(--hair);padding:5px 11px;border-radius:8px;cursor:pointer;transition:.13s;white-space:nowrap}
.chip svg{width:14px;height:14px;opacity:.85}
.chip:hover{color:var(--txt);border-color:var(--hair2)}
.chip.on{background:var(--accent-soft);color:var(--txt);border-color:transparent}
.chip .n{color:var(--txt3);font-size:11px;font-variant-numeric:tabular-nums}
.chip .sdot{width:7px;height:7px;border-radius:50%}
.sep{width:1px;height:18px;background:var(--hair);margin:0 3px}

/* 技能库网格 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:11px}
.card{position:relative;background:var(--s1);border:1px solid var(--hair);border-radius:var(--r14);padding:15px 16px 14px;cursor:pointer;transition:.16s var(--ease);overflow:hidden}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--sc,transparent);opacity:.0;transition:.16s}
.card:hover{border-color:var(--hair2);background:var(--s2);transform:translateY(-2px)}
.card:hover::before{opacity:.9}
.card.eq::before{opacity:.7}
.card .h{display:flex;align-items:flex-start;gap:11px}
.card .ic{width:34px;height:34px;flex:none;border-radius:9px;background:var(--s3);display:grid;place-items:center;color:var(--txt2);border:1px solid var(--hair)}
.card .ic svg{width:17px;height:17px}
.card .nm{font-size:14px;font-weight:600;line-height:1.3;margin-top:1px;word-break:break-word}
.card .meta{display:flex;align-items:center;gap:8px;margin-top:11px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--txt3)}
.tag .sdot{width:7px;height:7px;border-radius:50%;flex:none}
.lvl{display:inline-flex;gap:2px;align-items:center;margin-left:auto}
.lvl i{width:5px;height:5px;border-radius:50%;background:var(--s4)}.lvl i.on{background:var(--accent2)}
.badge{position:absolute;top:12px;right:13px;display:flex;gap:6px;align-items:center}
.b-eq{font-size:10.5px;font-weight:500;color:var(--accent2);background:var(--accent-soft);padding:2px 7px;border-radius:5px;display:inline-flex;align-items:center;gap:4px}
.b-eq svg{width:11px;height:11px}
.b-up{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;color:var(--up);background:rgba(232,196,77,.13)}
.b-up svg{width:12px;height:12px}
.b-lock{color:var(--txt3)}.b-lock svg{width:13px;height:13px}

/* 出战 */
.section{margin-bottom:26px}
.sec-h{display:flex;align-items:baseline;gap:10px;margin-bottom:13px}
.sec-h .t{font-size:13px;font-weight:600}.sec-h .d{font-size:11.5px;color:var(--txt3)}
.sec-h .more{margin-left:auto;font-size:11.5px;color:var(--txt3)}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(186px,1fr));gap:10px}
.slot{display:flex;align-items:center;gap:11px;background:var(--s1);border:1px solid var(--hair);border-radius:var(--r10);padding:11px 12px;transition:.15s var(--ease)}
.slot:hover{border-color:var(--hair2)}
.slot .ic{width:30px;height:30px;flex:none;border-radius:8px;background:var(--s3);display:grid;place-items:center;color:var(--txt2);position:relative}
.slot .ic svg{width:15px;height:15px}
.slot .ic::after{content:"";position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:50%;background:var(--sc);border:2px solid var(--s1)}
.slot .nm{font-size:13px;font-weight:550;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot .nm small{display:block;font-size:10.5px;color:var(--txt3);font-weight:400;margin-top:1px}
.slot .x{margin-left:auto;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;color:var(--txt4);cursor:pointer;flex:none}
.slot .x:hover{color:var(--warn);background:var(--s3)}.slot .x svg{width:13px;height:13px}
.slot.empty{border-style:dashed;border-color:var(--hair2);color:var(--txt3);justify-content:center;cursor:pointer}
.slot.empty:hover{border-color:var(--accent);color:var(--accent2)}
.slot.empty svg{width:14px;height:14px}.slot.empty span{font-size:12.5px}

/* 套装预设 */
.builds{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:11px}
.build{background:var(--s1);border:1px solid var(--hair);border-radius:var(--r14);padding:14px 15px;transition:.15s var(--ease)}
.build:hover{border-color:var(--hair2);background:var(--s2)}
.build .bt{display:flex;align-items:center;gap:9px}
.build .bt b{font-size:13.5px;font-weight:600;text-transform:capitalize}
.build .bt .c{font-size:11px;color:var(--txt3);margin-left:auto}
.build . stack,.build .stack{display:flex;margin:12px 0 13px}
.build .stack .av{width:26px;height:26px;border-radius:7px;background:var(--s3);border:1px solid var(--s1);display:grid;place-items:center;color:var(--txt2);margin-left:-6px}
.build .stack .av:first-child{margin-left:0}.build .stack .av svg{width:13px;height:13px}
.build .stack .more{font-size:10.5px;color:var(--txt3);align-self:center;margin-left:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:8px;border-radius:8px;font-size:12.5px;font-weight:550;cursor:pointer;border:1px solid var(--hair2);background:var(--s2);color:var(--txt);transition:.13s}
.btn:hover{background:var(--s3)}
.btn.pri{background:var(--accent);border-color:transparent;color:#fff}.btn.pri:hover{background:#7c86e0}
.btn svg{width:14px;height:14px}

/* 飞书系列货架 */
.shelf{background:linear-gradient(180deg,rgba(84,184,172,.05),transparent);border:1px solid var(--hair);border-radius:var(--r14);padding:16px 17px}
.shelf .sh{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.shelf .sh .ic{width:30px;height:30px;border-radius:8px;background:rgba(84,184,172,.13);display:grid;place-items:center;color:var(--src-gh)}
.shelf .sh .ic svg{width:16px;height:16px}
.shelf .sh b{font-size:13.5px;font-weight:600}
.shelf .sh .lk{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--txt3)}
.shelf .sh .lk svg{width:12px;height:12px}
.tiles{display:flex;flex-wrap:wrap;gap:6px}
.tile{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--txt2);background:var(--s1);border:1px solid var(--hair);border-radius:7px;padding:5px 9px}
.tile .sdot{width:6px;height:6px;border-radius:50%;background:var(--src-gh)}

/* 详情抽屉 */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.28s;z-index:30}.scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:392px;background:var(--s1);border-left:1px solid var(--hair2);transform:translateX(100%);transition:.34s var(--ease);z-index:31;display:flex;flex-direction:column;box-shadow:-12px 0 50px rgba(0,0,0,.4)}
.drawer.open{transform:none}
.dh{padding:22px 22px 18px;border-bottom:1px solid var(--hair);position:relative}
.dh .close{position:absolute;right:16px;top:16px;width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--txt3);cursor:pointer}.dh .close:hover{background:var(--s3);color:var(--txt)}.dh .close svg{width:15px;height:15px}
.dh .top{display:flex;gap:14px;align-items:center;padding:0;border:0}
.dh .big{width:54px;height:54px;border-radius:13px;background:var(--s3);border:1px solid var(--hair2);display:grid;place-items:center;color:var(--txt);flex:none;position:relative}
.dh .big svg{width:26px;height:26px}
.dh .big::after{content:"";position:absolute;right:-2px;bottom:-2px;width:13px;height:13px;border-radius:50%;background:var(--sc);border:3px solid var(--s1)}
.dh h2{font-size:18px;font-weight:600;line-height:1.25;word-break:break-word}
.dh .sub{font-size:12px;color:var(--txt3);margin-top:3px}
.db{flex:1;overflow:auto;padding:20px 22px}
.db h4{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);font-weight:600;margin:20px 0 9px}.db h4:first-child{margin-top:0}
.kv{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:7px 0;border-bottom:1px solid var(--hair)}.kv span{color:var(--txt3)}.kv b{font-weight:500}
.kv .src{display:inline-flex;align-items:center;gap:6px}.kv .src .sdot{width:8px;height:8px;border-radius:50%}
.mlvl{display:flex;gap:4px;align-items:center}.mlvl i{width:7px;height:7px;border-radius:50%;background:var(--s4)}.mlvl i.on{background:var(--accent2)}
.df{flex:none;padding:14px 22px;border-top:1px solid var(--hair);display:flex;gap:9px}
.df .btn{flex:1}
.df .ro{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;font-size:12px;color:var(--txt3);background:var(--s2);border:1px solid var(--hair);border-radius:8px;padding:8px}
.df .ro svg{width:13px;height:13px}
.note{font-size:11.5px;color:var(--txt3);background:var(--s1);border:1px solid var(--hair);border-radius:8px;padding:9px 12px;margin-bottom:18px;line-height:1.6}
.note b{color:var(--txt2);font-weight:600}
.empty{color:var(--txt3);padding:46px;text-align:center}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand"><div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M12 3l2.5 5 5.5.7-4 3.9 1 5.4L12 16l-5 2.9 1-5.4-4-3.9 5.5-.7z"/></svg></div><b class="disp">SkillHub</b></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot">59 在库 · 27 飞书外部<br>共 86 技能</div>
  </aside>
  <main class="main">
    <div class="top">
      <h1 class="disp" id="title"></h1>
      <div class="search" id="searchBox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="search" placeholder="搜索技能…"></div>
    </div>
    <div class="scroll" id="content"></div>
  </main>
</div>
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer"></aside>

<script>
const $=id=>document.getElementById(id);
/* ---------- 线性图标(无 emoji) ---------- */
const P=(d,sw=1.8)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
const ICON={
  // 分组
  tools:'<path d="M15 7a4 4 0 0 1-5.1 5.1L5 17l2 2 4.9-4.9A4 4 0 0 0 17 9l-2.3 2.3-2-2z"/>',
  utils:'<path d="M4 7h10M18 7h2M4 12h2M10 12h10M4 17h14M20 17h0"/><circle cx="15" cy="7" r="1.6"/><circle cx="8" cy="12" r="1.6"/><circle cx="17" cy="17" r="1.6"/>',
  'web-creative':'<path d="M4 20l1-4L15.5 5.5a2 2 0 0 1 3 3L8 19l-4 1z"/><path d="M13.5 7.5l3 3"/>',
  media:'<rect x="4" y="5" width="16" height="14" rx="2"/><path d="M10 9l5 3-5 3z"/>',
  jarvis:'<rect x="7" y="7" width="10" height="10" rx="2"/><path d="M9 3v2M15 3v2M9 19v2M15 19v2M3 9h2M3 15h2M19 9h2M19 15h2"/>',
  workbuddy:'<rect x="3" y="8" width="18" height="11" rx="2"/><path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M3 13h18"/>',
  xhs:'<path d="M6 4h9a2 2 0 0 1 2 2v14H8a2 2 0 0 1-2-2z"/><path d="M10 4v16M13 9h2M13 13h2"/>',
  contracts:'<path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4M10 13h5M10 16h5"/>',
  lark:'<path d="M5 5h14v9H9l-4 4z"/><path d="M9 9.5h6M9 12h4"/>',
  // UI
  inv:'<rect x="3" y="3" width="7" height="7" rx="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.6"/>',
  equip:'<path d="M13 2L4.5 13H11l-1 9 8.5-12H12z"/>',
  up:'<path d="M12 19V6M6 12l6-6 6 6"/>',
  chart:'<path d="M5 20V11M12 20V4M19 20v-6M3 20h18"/>',
  gear:'<circle cx="12" cy="12" r="3"/><path d="M19.4 13a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V19a2 2 0 1 1-4 0a1.6 1.6 0 0 0-2.7-1.1l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4 13a2 2 0 1 1 0-4a1.6 1.6 0 0 0 1.1-2.7l-.1-.1A2 2 0 1 1 7.7 3.4l.1.1A1.6 1.6 0 0 0 10 4a2 2 0 1 1 4 0a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.6 1.6 0 0 0 20 9a2 2 0 1 1 0 4z"/>',
  lock:'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>',
  check:'<path d="M20 6L9 17l-5-5"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  x:'<path d="M6 6l12 12M18 6L6 18"/>',
};
const ic=(k,sw)=>P(ICON[k]||ICON.tools,sw);
const GI=g=>ICON[g]?g:'tools';

/* ---------- 来源(中性,只做安静标识,不分高下) ---------- */
const SRC={github:{c:'var(--src-gh)',zh:'GitHub'},local:{c:'var(--src-self)',zh:'自制'},'manual-port':{c:'var(--src-gh)',zh:'GitHub·改'},website:{c:'var(--src-web)',zh:'网站'}};
const srcOf=s=>s.ch==='local'?'local':(s.ch==='manual-port'?'manual-port':'github'); // 飞书 ch=lark-cli → github 源
const GNAME={tools:'工具',utils:'实用',media:'媒体',jarvis:'Jarvis',workbuddy:'WorkBuddy',xhs:'小红书',contracts:'合同',lark:'飞书','web-creative':'网页创作'};

t":"global","ch":"lark-cli","x":true,"oss":false,"lu":null},{"n":"lark-vc-agent","g":"lark","t":"global","ch":"lark-cli","x":true,"oss":false,"lu":null},{"n":"lark-whiteboard","g":"lark","t":"global","ch":"lark-cli","x":true,"oss":false,"lu":null},{"n":"lark-wiki","g":"lark","t":"global","ch":"lark-cli","x":true,"oss":false,"lu":null},{"n":"lark-workflow-meeting-summary","g":"lark","t":"global","ch":"lark-cli","x":true,"oss":false,"lu":null},{"n":"lark-workflow-standup-report","g":"lark","t":"global","ch":"lark-cli","x":true,"oss":false,"lu":null}],"loadouts":{"web":["web-design-engineer","frontend-design","qr-poster-compositor","guizang-ppt-skill"],"media":["image-asset-pipeline","minimax-tts","newapi-imagegen","video-dissection-local"],"jarvis":["jarvis-class-presentation","jarvis-daguan-closing-package","jarvis-daguan-miniapp-smoke","jarvis-kb-retriever","jarvis-provenance-check","jarvis-safe-ingest-guard","jarvis-source-ingest","jarvis-wiki-lint","jarvis-wiki-merge","jarvis-workbuddy-law-workshop-webpage","jarvis-workbuddy-legal-ai-workshop-webpage"],"xhs":["xhs-bounty-image-generator","xhs-manual-bounty-run"],"workbuddy":["workbuddy-tencent-esign","workbuddy-tencent-inventory","workbuddy-tmeet"],"contracts":["contract-review","contract-review-v3"]},"stats":{"total":86,"global":33,"oss":18,"external":27,"groups":["contracts","jarvis","lark","media","tools","utils","web-creative","workbuddy","xhs"]}};
const S=DATA.skills;
const inHub=S.filter(s=>!s.x), lark=S.filter(s=>s.x);
const equipped=inHub.filter(s=>s.t==='global'); // 常驻=已装备
const upgradable=new Set(['guizang-ppt-skill','notebooklm','stop-slop','web-design-guidelines']); // 演示:有更新

const state={view:'inv',q:'',cat:'all',src:'all',sel:null};

/* ---------- 通用 ---------- */
function lvlOf(s){ if(s.lu===null) return 0; if(s.lu===0) return 5; if(s.lu<7)return 4; if(s.lu<30)return 3; if(s.lu<90)return 2; return 1; }
function lvlDots(n,cls='lvl'){let h='';for(let i=0;i<5;i++)h+=`<i class="${i<n?'on':''}"></i>`;return `<div class="${cls}">${h}</div>`;}
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

/* ---------- 导航 ---------- */
const NAV=[['inv','inv','技能库',inHub.length],['equip','equip','出战装备',''],['up','up','升级',upgradable.size],['stats','chart','战绩',''],['set','gear','设置','']];
const TITLES={inv:['技能库','浏览 · 装备 · 收藏'],equip:['出战装备','你携带什么,决定 AI 会什么'],up:['升级','开源技能的上游更新'],stats:['战绩','用得越多,熟练度越高'],set:['设置','']};
function buildNav(){$('nav').innerHTML=NAV.map(([v,i,t,c])=>`<a data-v="${v}" class="${state.view===v?'on':''}">${ic(i)}<span>${t}</span>${c!==''?`<span class="ct">${c}</span>`:''}</a>`).join('');}
$('nav').onclick=e=>{const a=e.target.closest('a[data-v]');if(!a)return;state.view=a.dataset.v;state.sel=null;$('searchBox').style.display=a.dataset.v==='inv'?'block':'none';buildNav();render();};
$('search').oninput=e=>{state.q=e.target.value.toLowerCase();render();};

function render(){const t=TITLES[state.view];$('title').innerHTML=t[0]+(t[1]?` <small>${t[1]}</small>`:'');
  $('content').innerHTML=({inv:invView,equip:equipView,up:upView,stats:statsView,set:setView})[state.view]();}

/* ---------- 技能库 ---------- */
const matchQ=s=>!state.q||s.n.toLowerCase().includes(state.q);
function card(s){
  const sr=SRC[srcOf(s)],eq=s.t==='global'&&!s.x,up=upgradable.has(s.n),lv=lvlOf(s);
  return `<div class="card${eq?' eq':''}" style="--sc:${sr.c}" data-n="${s.n}">
    <div class="badge">${up?`<span class="b-up" title="可升级">${ic('up',2)}</span>`:''}${s.x?`<span class="b-lock" title="外部·只读">${ic('lock')}</span>`:eq?`<span class="b-eq">${ic('check',2.4)}携带中</span>`:''}</div>
    <div class="h">
      <div class="ic">${ic(GI(s.g))}</div>
      <div style="min-width:0"><div class="nm">${s.n}</div></div>
    </div>
    <div class="meta">
      <span class="tag"><span class="sdot" style="background:${sr.c}"></span>${sr.zh}</span>
      <span class="tag">${GNAME[s.g]||s.g}</span>
      ${lvlDots(lv)}
    </div>
  </div>`;
}
function invView(){
  const cats=[...new Set(inHub.map(s=>s.g))].sort();
  const srcKeys=[['github','GitHub'],['local','自制']];
  const list=inHub.filter(s=>(state.cat==='all'||s.g===state.cat)&&(state.src==='all'||srcOf(s)===state.src)&&matchQ(s))
    .sort((a,b)=>(b.t==='global')-(a.t==='global')||a.n.localeCompare(b.n));
  const catChips=cats.map(g=>`<span class="chip ${state.cat===g?'on':''}" data-cat="${g}">${ic(GI(g))}${GNAME[g]||g}<span class="n">${inHub.filter(s=>s.g===g).length}</span></span>`).join('');
  const srcChips=srcKeys.map(([k,z])=>`<span class="chip ${state.src===k?'on':''}" data-src="${k}"><span class="sdot" style="background:${SRC[k].c}"></span>${z}<span class="n">${inHub.filter(s=>srcOf(s)===k).length}</span></span>`).join('');
  return `<div class="filters">
    <span class="chip ${state.cat==='all'&&state.src==='all'?'on':''}" data-cat="all" data-src="all">全部<span class="n">${inHub.length}</span></span>
    <span class="sep"></span>${srcChips}<span class="sep"></span>${catChips}</div>
    <div class="grid">${list.map(card).join('')||'<div class="empty">没有匹配的技能</div>'}</div>`;
}

/* ---------- 出战装备 ---------- */
function equipView(){
  const slots=equipped.map(s=>{const sr=SRC[srcOf(s)];return `<div class="slot" style="--sc:${sr.c}" data-n="${s.n}">
    <div class="ic">${ic(GI(s.g))}</div>
    <div style="min-width:0" class="nm">${s.n}<small>${sr.zh} · ${GNAME[s.g]||s.g}</small></div>
    <div class="x" title="卸下">${ic('x')}</div></div>`;}).join('');
  const emptySlot=`<div class="slot empty">${ic('plus')}<span>从技能库装备</span></div>`;
  const builds=Object.entries(DATA.loadouts).map(([n,m])=>{
    const av=m.slice(0,4).map(nm=>{const sk=S.find(x=>x.n===nm);return `<div class="av">${ic(GI(sk?sk.g:'tools'))}</div>`;}).join('');
    return `<div class="build"><div class="bt"><b>${n}</b><span class="c">${m.length} 技能</span></div>
      <div class="stack">${av}${m.length>4?`<span class="more">+${m.length-4}</span>`:''}</div>
      <button class="btn pri">${ic('equip',2.2)}一键出战</button></div>`;
  }).join('');
  const larkTiles=lark.map(s=>`<span class="tile"><span class="sdot"></span>${s.n.replace('lark-','')}</span>`).join('');
  return `<div class="note">「<b>携带 / 常驻</b>」的技能在<b>每个项目</b>自动生效;其余留在技能库,按项目临时装备。来源只是出身标识,<b>不分高下</b>;唯一的强弱是真实<b>熟练度</b>。</div>
   <div class="section"><div class="sec-h"><span class="t">随身携带</span><span class="d">${equipped.length} 个常驻 · 所有项目自带</span></div>
     <div class="slots">${slots}${emptySlot}</div></div>
   <div class="section"><div class="sec-h"><span class="t">套装预设</span><span class="d">一键装备一整组</span></div>
     <div class="builds">${builds}</div></div>
   <div class="section"><div class="shelf"><div class="sh"><div class="ic">${ic('lark')}</div><b>飞书全家桶</b><span class="lk">${ic('lock')}外部托管 · 只读 · 随 lark-cli 升级</span></div>
     <div class="tiles">${larkTiles}</div></div></div>`;
}

/* ---------- 升级 ---------- */
function upView(){
  const ups=inHub.filter(s=>upgradable.has(s.n));
  const rows=ups.map(s=>{const sr=SRC[srcOf(s)];return `<div class="slot" style="--sc:${sr.c}" data-n="${s.n}">
    <div class="ic">${ic(GI(s.g))}</div>
    <div style="min-width:0" class="nm">${s.n}<small>${sr.zh} · 有新版本</small></div>
    <button class="btn pri" style="width:auto;padding:7px 13px;margin-left:auto">${ic('up',2.2)}升级</button></div>`;}).join('');
  return `<div class="note">GitHub 来源的技能会比对上游 commit。每周一自动判定,这里可手动<b>立即检查</b>。飞书走 lark-cli 自己升级,不在此列。</div>
    <div class="section"><div class="sec-h"><span class="t">可升级</span><span class="d">${ups.length} 个有上游更新</span><span class="more">立即检查 ↻</span></div>
    <div class="slots" style="grid-template-columns:1fr">${rows}</div></div>`;
}
function statsView(){
  const sorted=[...inHub].sort((a,b)=>(a.lu===null?1e9:a.lu)-(b.lu===null?1e9:b.lu)===0?0:((b.lu===null?1e9:b.lu)-(a.lu===null?1e9:a.lu)));
  return `<div class="note">熟练度来自真实调用次数(PostToolUse hook)。久未使用排在最前 = 删除候选。这是唯一诚实的"强弱"轴。</div>
   <div class="section"><div class="sec-h"><span class="t">久未使用</span><span class="d">考虑卸下或删除</span></div>
   <div class="slots" style="grid-template-columns:repeat(auto-fill,minmax(240px,1fr))">${sorted.slice(0,12).map(s=>{const sr=SRC[srcOf(s)];return `<div class="slot" style="--sc:${sr.c}" data-n="${s.n}"><div class="ic">${ic(GI(s.g))}</div><div style="min-width:0" class="nm">${s.n}<small>${s.lu===null?'从未使用':s.lu+' 天前'}</small></div>${lvlDots(lvlOf(s))}</div>`;}).join('')}</div></div>`;
}
function setView(){return `<div class="note">这是设计原型。真实功能(常驻切换/项目装备/删除/同步/立即检查)已在主程序里实现并通过沙箱实测。</div><div class="empty">设置项见主程序</div>`;}

/* ---------- 详情抽屉 ---------- */
function openDrawer(n){
  const s=S.find(x=>x.n===n);if(!s)return;state.sel=n;
  const sr=SRC[srcOf(s)],eq=s.t==='global'&&!s.x,lv=lvlOf(s),up=upgradable.has(s.n);
  let mlvl='';for(let i=0;i<5;i++)mlvl+=`<i class="${i<lv?'on':''}"></i>`;
  $('drawer').style.setProperty('--sc',sr.c);
  $('drawer').innerHTML=`
   <div class="dh"><div class="close" onclick="closeDrawer()">${ic('x')}</div>
     <div class="top"><div class="big" style="--sc:${sr.c}">${ic(GI(s.g),1.7)}</div>
       <div style="min-width:0"><h2>${s.n}</h2><div class="sub">${GNAME[s.g]||s.g} · ${s.x?'飞书全家桶':eq?'携带中':'在库'}</div></div></div></div>
   <div class="db">
     <h4>出身与来源</h4>
     <div class="kv"><span>来源</span><b class="src"><span class="sdot" style="background:${sr.c}"></span>${sr.zh}${s.x?' (larksuite/cli)':''}</b></div>
     <div class="kv"><span>归谁管</span><b>${s.x?'外部 · lark-cli 托管(只读)':'本 hub · 可编辑'}</b></div>
     <div class="kv"><span>更新</span><b>${s.x?'随 lark-cli 自动升级':up?'有上游更新 ↑':srcOf(s)==='github'?'比对 GitHub 上游':'本地自制'}</b></div>
     <h4>熟练度</h4>
     <div class="kv"><span>等级(按真实用量)</span><b><div class="mlvl">${mlvl}</div></b></div>
     <div class="kv"><span>最近使用</span><b>${s.lu===null?'从未使用':s.lu===0?'今天':s.lu+' 天前'}</b></div>
     <h4>说明</h4>
     <div style="font-size:12.5px;color:var(--txt2);line-height:1.65">${s.n} —— ${GNAME[s.g]||s.g}类技能。${s.x?'飞书官方套件之一,覆盖飞书生态;在此只读,更新与卸载请用 lark-cli / npx skills。':'真实说明读取自该技能的 SKILL.md(原型中略)。'}</div>
   </div>
   <div class="df">${s.x
     ? `<div class="ro">${ic('lock')}外部 · 只读</div>`
     : `<button class="btn pri">${eq?ic('x',2.2)+'卸下':ic('equip',2.2)+'携带'}</button><button class="btn">${ic('up',2.2)}升级</button>`}</div>`;
  $('drawer').classList.add('open');$('scrim').classList.add('open');
}
function closeDrawer(){$('drawer').classList.remove('open');$('scrim').classList.remove('open');state.sel=null;}
$('scrim').onclick=closeDrawer;
$('content').onclick=e=>{
  const t=e.target;
  const cat=t.closest('[data-cat]');if(cat){state.cat=cat.dataset.cat;if(cat.dataset.src)state.src=cat.dataset.src;return render();}
  const src=t.closest('[data-src]');if(src){state.src=src.dataset.src;return render();}
  const item=t.closest('[data-n]');if(item){if(t.closest('.x'))return;openDrawer(item.dataset.n);}
};

buildNav();$('searchBox').style.display='block';render();
</script>
