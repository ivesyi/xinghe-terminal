<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillHub · 技能图鉴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ground:#08090D;--s1:#13141A;--s2:#1A1B22;--s3:#23242C;--s4:#2D2E37;
  --glass:linear-gradient(165deg,rgba(33,35,44,.92),rgba(17,18,24,.92));
  --hair:rgba(255,255,255,.07);--hair2:rgba(255,255,255,.12);
  --txt:#F4F5F8;--txt2:#A6ABBA;--txt3:#888FA3;--txt4:#5A6072;
  --accent:#7C86E6;--accent2:#a3aaf2;--accent-soft:rgba(124,134,230,.16);
  /* 来源(中性,不分高下;两个等权中性色,作为精通环的环色) */
  --src-gh:#4FB6AB;   /* GitHub 来源 */
  --src-self:#8B92B8; /* 自制(中性 slate) */
  --mastery:#9BA4F2;  /* 精通度色(环长 / 进度) */
  --up:#F0CB52;--warn:#E08B4B;
  --r-pill:8px;--r-card:14px;--r-lg:18px;
  --ease:cubic-bezier(.22,1,.36,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{background:var(--ground);color:var(--txt);font:14px/1.55 'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.disp{font-family:'Inter Tight',sans-serif;letter-spacing:-.02em}.mono{font-family:'JetBrains Mono',monospace}
svg{display:block}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:6px}::-webkit-scrollbar-thumb:hover{background:var(--s4)}::-webkit-scrollbar-track{background:transparent}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg::before{content:"";position:absolute;inset:-20%;
  background:radial-gradient(620px 420px at 16% 10%,rgba(124,134,230,.14),transparent 60%),
            radial-gradient(560px 420px at 88% 6%,rgba(70,194,176,.08),transparent 60%),
            radial-gradient(680px 520px at 72% 98%,rgba(155,164,242,.06),transparent 62%);
  animation:drift 28s var(--ease) infinite alternate}
.bg::after{content:"";position:absolute;inset:0;opacity:.45;
  background-image:radial-gradient(rgba(255,255,255,.5) .6px,transparent .7px);background-size:42px 42px;
  mask:radial-gradient(circle at 50% 26%,#000,transparent 76%)}
@keyframes drift{to{transform:translate3d(-22px,16px,0) scale(1.05)}}
.app{position:relative;z-index:1;height:100vh;display:flex}

/* 左栏 */
.rail{width:218px;flex:none;border-right:1px solid var(--hair);display:flex;flex-direction:column;padding:16px 12px;background:linear-gradient(180deg,rgba(255,255,255,.018),transparent 40%)}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 18px}
.brand .mark{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 50% 35%,var(--accent),#3e47a8);display:grid;place-items:center;box-shadow:0 5px 18px rgba(124,134,230,.45),inset 0 1px 0 rgba(255,255,255,.35)}
.brand .mark svg{width:16px;height:16px;color:#fff}
.brand b{font-size:15.5px;font-weight:600}
.nav{display:flex;flex-direction:column;gap:3px}
.nav a{position:relative;display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--txt2);cursor:pointer;font-size:13.5px;font-weight:450;transition:.16s var(--ease)}
.nav a svg{width:17px;height:17px;flex:none;opacity:.8}
.nav a:hover{background:var(--s1);color:var(--txt)}
.nav a.on{background:linear-gradient(100deg,var(--accent-soft),transparent);color:var(--txt)}
.nav a.on::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:2.5px;border-radius:3px;background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
.nav a.on svg{opacity:1;color:var(--accent2)}
.nav a .ct{margin-left:auto;font-size:11px;color:var(--txt3);font-variant-numeric:tabular-nums}
.rail .foot{margin-top:auto;padding:11px 9px 2px;border-top:1px solid var(--hair);font-size:11px;color:var(--txt3);line-height:1.6}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{flex:none;display:flex;align-items:center;gap:16px;padding:18px 28px 15px;border-bottom:1px solid var(--hair)}
.top h1{font-size:20px;font-weight:600}.top h1 small{font-size:12.5px;color:var(--txt3);font-weight:400;margin-left:11px}
.search{margin-left:auto;position:relative;width:234px}
.search input{width:100%;background:var(--s1);border:1px solid var(--hair);border-radius:9px;color:var(--txt);padding:8px 11px 8px 33px;font-size:13px;outline:none;transition:.16s}
.search input:focus{border-color:var(--accent);background:var(--s2);box-shadow:0 0 0 3px var(--accent-soft)}
.search svg{position:absolute;left:11px;top:9px;width:15px;height:15px;color:var(--txt3)}
.scroll{flex:1;overflow:auto;padding:22px 28px 52px}

.filters{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
.chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--txt2);background:var(--s1);border:1px solid var(--hair);padding:6px 12px;border-radius:9px;cursor:pointer;transition:.14s}
.chip svg{width:14px;height:14px;opacity:.8}
.chip:hover{color:var(--txt);border-color:var(--hair2);transform:translateY(-1px)}
.chip.on{background:linear-gradient(120deg,var(--accent-soft),rgba(124,134,230,.05));color:var(--txt);border-color:rgba(124,134,230,.4)}
.chip .n{color:var(--txt3);font-size:11px;font-variant-numeric:tabular-nums}
.chip .sdot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 7px -1px currentColor}
.sep{width:1px;height:18px;background:var(--hair);margin:0 4px}
.legend{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--txt3);margin:-8px 0 18px}
.legend .lg{display:inline-flex;align-items:center;gap:5px}
.legend .sdot{width:7px;height:7px;border-radius:50%;box-shadow:0 0 6px -1px currentColor}

/* ★ 技能图标 + 精通环(法术 icon)—— 环长=精通度,环色=习得来源 */
.glyph{position:relative;flex:none;border-radius:50%;display:grid;place-items:center}
.glyph .ring{position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(from -90deg,var(--sc) calc(var(--m,0)*1%),color-mix(in srgb,var(--sc) 30%,transparent) 0);
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 2.5px),#000 calc(100% - 2.5px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 2.5px),#000 calc(100% - 2.5px))}
.glyph .aura{position:absolute;inset:-3px;border-radius:50%;box-shadow:0 0 15px -4px var(--sc);opacity:calc(.1 + var(--m,0)*0.006);transition:.2s}
.glyph .face{position:absolute;inset:2.5px;border-radius:50%;background:radial-gradient(circle at 50% 32%,#272935,#13141a);border:1px solid var(--hair2);box-shadow:inset 0 0 11px rgba(0,0,0,.55)}
.glyph svg{position:relative;color:#e7eaf4}
.glyph.lg{width:48px;height:48px}.glyph.lg svg{width:21px;height:21px}
.glyph.sm{width:36px;height:36px}.glyph.sm svg{width:16px;height:16px}
.glyph.xl{width:60px;height:60px}.glyph.xl svg{width:26px;height:26px}

/* 技能图鉴 —— 能力条目卡 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:12px;grid-auto-rows:1fr}
.card{position:relative;display:flex;flex-direction:column;height:100%;background:var(--glass);border:1px solid var(--hair);border-radius:var(--r-card);padding:15px 16px;cursor:pointer;overflow:hidden;
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 4px 16px -6px rgba(0,0,0,.5);transition:.18s var(--ease)}
.card::after{content:"";position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.05) 48%,transparent 60%);transform:translateX(-120%);transition:.55s var(--ease);pointer-events:none}
.card:hover{border-color:var(--hair2);transform:translateY(-3px);box-shadow:0 14px 32px -14px rgba(0,0,0,.7)}
.card:hover::after{transform:translateX(120%)}
.card:hover .glyph .aura{opacity:.85}
.card.eq{border-color:color-mix(in srgb,var(--accent) 38%,var(--hair))}
.card .h{display:flex;align-items:center;gap:13px}
.card .nm{font-size:14.5px;font-weight:600;line-height:1.28;word-break:break-word}
.card .nm .lv{display:block;font-size:11px;color:var(--txt3);font-weight:400;margin-top:3px}
.card .nm .lv b{color:var(--mastery);font-weight:600}
.card .meta{display:flex;align-items:center;gap:9px;margin-top:auto;padding-top:13px;border-top:1px solid var(--hair);flex-wrap:wrap}
.card .h{flex:none}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--txt3)}
.tag .sdot{width:7px;height:7px;border-radius:50%;box-shadow:0 0 6px -1px currentColor;flex:none}
.badge{margin-left:auto;display:flex;gap:7px;align-items:center}
.b-eq{font-size:10.5px;font-weight:600;color:var(--accent2);background:var(--accent-soft);padding:3px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;border:1px solid rgba(124,134,230,.3)}
.b-eq svg{width:11px;height:11px}
.b-up{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;color:var(--up);background:rgba(240,203,82,.14);box-shadow:0 0 0 1px rgba(240,203,82,.3);animation:pulse 2.2s var(--ease) 3}
.b-up svg{width:12px;height:12px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 1px rgba(240,203,82,.3),0 0 0 0 rgba(240,203,82,.25)}50%{box-shadow:0 0 0 1px rgba(240,203,82,.5),0 0 0 5px rgba(240,203,82,0)}}
.b-lock{color:var(--txt3)}.b-lock svg{width:13px;height:13px}

/* 主技能栏 —— hotbar */
.section{margin-bottom:30px}
.sec-h{display:flex;align-items:baseline;gap:10px;margin-bottom:15px}
.sec-h .t{font-size:14px;font-weight:600}.sec-h .d{font-size:11.5px;color:var(--txt3)}
.sec-h .more{margin-left:auto;font-size:11.5px;color:var(--accent2);cursor:pointer}
.hotbar{display:flex;gap:12px;flex-wrap:wrap;padding:18px;background:linear-gradient(180deg,rgba(124,134,230,.05),rgba(17,18,24,.4));border:1px solid var(--hair);border-radius:16px}
.hslot{position:relative;width:92px;display:flex;flex-direction:column;align-items:center;gap:9px;cursor:pointer}
.hslot .ix{position:absolute;top:-2px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--txt3);font-family:'JetBrains Mono'}
.hslot .nm{font-size:11px;color:var(--txt2);text-align:center;line-height:1.3;max-width:92px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.hslot:hover .glyph .aura{opacity:.9}
.hslot:hover .glyph{transform:translateY(-2px);transition:.16s var(--ease)}
.hslot.empty{opacity:.85}.hslot.empty:hover{opacity:1}
.hslot.empty .glyph .face{background:transparent;border:1.5px dashed var(--hair2)}
.hslot.empty:hover .glyph .face{border-color:var(--accent)}
.hslot.empty .glyph svg{color:var(--txt3);width:22px;height:22px}.hslot.empty:hover .glyph svg{color:var(--accent2)}
.hslot.empty .nm{color:var(--txt3);white-space:nowrap;max-width:none;-webkit-line-clamp:unset;display:block}

/* 技能组 */
.builds{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.build{background:var(--glass);border:1px solid var(--hair);border-radius:15px;padding:15px 16px;transition:.16s var(--ease);box-shadow:0 4px 16px -8px rgba(0,0,0,.5)}
.build:hover{border-color:var(--hair2);transform:translateY(-2px)}
.build .bt{display:flex;align-items:center;gap:9px}
.build .bt b{font-size:14px;font-weight:600;text-transform:capitalize}
.build .bt .c{font-size:11px;color:var(--txt3);margin-left:auto}
.members{display:flex;flex-wrap:wrap;gap:6px;margin:13px 0 14px}
.mem{font-size:11px;color:var(--txt2);background:var(--s1);border:1px solid var(--hair);border-radius:6px;padding:3px 8px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mem.more{color:var(--txt3);background:transparent;border-color:transparent;padding-left:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:9px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--hair2);background:var(--s2);color:var(--txt);transition:.14s}
.btn:hover{background:var(--s3);transform:translateY(-1px)}
.btn.pri{background:linear-gradient(120deg,var(--accent),#5b64c8);border-color:transparent;color:#fff;box-shadow:0 4px 14px -4px rgba(124,134,230,.6)}
.btn.pri:hover{box-shadow:0 6px 18px -4px rgba(124,134,230,.75)}
.btn svg{width:14px;height:14px}

/* 行式(升级/修炼) */
.rows{display:flex;flex-direction:column;gap:9px}
.row{position:relative;display:flex;align-items:center;gap:13px;background:var(--glass);border:1px solid var(--hair);border-radius:13px;padding:11px 14px;cursor:pointer;transition:.16s var(--ease)}
.row:hover{border-color:var(--hair2);transform:translateY(-1px)}
.row .nm{font-size:13.5px;font-weight:600;min-width:0}.row .nm small{display:block;font-size:10.5px;color:var(--txt3);font-weight:400;margin-top:2px}
.row .rt{margin-left:auto;display:flex;align-items:center;gap:12px}

/* 飞书外部法术书 */
.shelf{position:relative;background:linear-gradient(165deg,rgba(70,194,176,.06),rgba(17,18,24,.5));border:1px solid var(--hair);border-radius:15px;padding:17px 18px;overflow:hidden}
.shelf::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--src-gh);opacity:.6;box-shadow:0 0 14px -1px var(--src-gh)}
.shelf .sh{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.shelf .sh b{font-size:14px;font-weight:600}
.shelf .sh .lk{margin-left:auto;display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--txt3)}
.shelf .sh .lk svg{width:12px;height:12px}
.tiles{display:flex;flex-wrap:wrap;gap:7px}
.tile{display:inline-flex;align-items:center;font-size:11.5px;color:var(--txt2);background:var(--s1);border:1px solid var(--hair);border-radius:var(--r-pill);padding:6px 11px;transition:.13s;cursor:pointer}
.tile:hover{border-color:var(--hair2);color:var(--txt);transform:translateY(-1px)}

.note{font-size:11.5px;color:var(--txt3);background:var(--s1);border:1px solid var(--hair);border-radius:10px;padding:10px 13px;margin-bottom:20px;line-height:1.65}
.note b{color:var(--txt2);font-weight:600}
.empty{color:var(--txt3);padding:46px;text-align:center}

/* 详情 = 技能图鉴页 */
.scrim{position:fixed;inset:0;background:rgba(4,5,8,.55);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.3s;z-index:30}.scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:406px;background:linear-gradient(180deg,#15161c,#101117);border-left:1px solid var(--hair2);transform:translateX(100%);transition:.36s var(--ease);z-index:31;display:flex;flex-direction:column;box-shadow:-16px 0 60px rgba(0,0,0,.5)}
.drawer.open{transform:none}
.dh{padding:24px 22px 20px;border-bottom:1px solid var(--hair);position:relative;overflow:hidden;text-align:center}
.dh::before{content:"";position:absolute;top:-70px;left:50%;transform:translateX(-50%);width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb,var(--sc) 20%,transparent),transparent 70%)}
.dh .close{position:absolute;right:16px;top:16px;width:29px;height:29px;border-radius:8px;display:grid;place-items:center;color:var(--txt3);cursor:pointer;z-index:2}.dh .close:hover{background:var(--s3);color:var(--txt)}.dh .close svg{width:15px;height:15px}
.bigwrap{position:relative;width:80px;height:80px;margin:4px auto 14px;display:grid;place-items:center;z-index:1}
.bigwrap .halo{position:absolute;inset:0;border-radius:50%;border:1px dashed color-mix(in srgb,var(--sc) 50%,transparent);opacity:.45;animation:spin 20s linear infinite}
.bigwrap .halo2{position:absolute;inset:6px;border-radius:50%;border:1px solid color-mix(in srgb,var(--sc) 28%,transparent);opacity:.4;animation:spin 30s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.dh h2{font-size:18.5px;font-weight:600;line-height:1.25;position:relative;z-index:1;word-break:break-word}
.dh .sub{font-size:12px;color:var(--txt3);margin-top:5px;position:relative;z-index:1}
.db{flex:1;overflow:auto;padding:20px 22px}
.db h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt3);font-weight:600;margin:20px 0 9px}.db h4:first-child{margin-top:0}
.kv{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:8px 0;border-bottom:1px solid var(--hair)}.kv span{color:var(--txt3)}.kv b{font-weight:500}
.kv .src{display:inline-flex;align-items:center;gap:6px}.kv .src .sdot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 7px -1px currentColor}
.mbar{height:7px;border-radius:4px;background:var(--s3);overflow:hidden;margin-top:6px;margin-bottom:2px}
.mbar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--mastery),var(--accent2));box-shadow:0 0 8px -1px var(--mastery)}
.df{flex:none;padding:15px 22px;border-top:1px solid var(--hair);display:flex;gap:9px}
.df .btn{flex:1}
.df .ro{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;font-size:12px;color:var(--txt3);background:var(--s2);border:1px solid var(--hair);border-radius:9px;padding:9px}.df .ro svg{width:13px;height:13px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="app">
  <aside class="rail">
    <div class="brand"><div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M12 3l2.5 5 5.5.7-4 3.9 1 5.4L12 16l-5 2.9 1-5.4-4-3.9 5.5-.7z"/></svg></div><b class="disp">SkillHub</b></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot">59 本地技能 · 27 飞书外部<br>共 86 技能</div>
  </aside>
  <main class="main">
    <div class="top"><h1 class="disp" id="title"></h1>
      <div class="search" id="searchBox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="search" placeholder="搜索技能…"></div>
    </div>
    <div class="scroll" id="content"></div>
  </main>
</div>
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer"></aside>

<script>
const $=id=>document.getElementById(id);
const P=(d,sw=1.8)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
const ICON={
  tools:'<path d="M15 7a4 4 0 0 1-5.1 5.1L5 17l2 2 4.9-4.9A4 4 0 0 0 17 9l-2.3 2.3-2-2z"/>',
  utils:'<path d="M4 7h10M18 7h2M4 12h2M10 12h10M4 17h14"/><circle cx="15" cy="7" r="1.5"/><circle cx="8" cy="12" r="1.5"/><circle cx="17" cy="17" r="1.5"/>',
  'web-creative':'<path d="M4 20l1-4L15.5 5.5a2 2 0 0 1 3 3L8 19l-4 1z"/><path d="M13.5 7.5l3 3"/>',
  media:'<rect x="4" y="5" width="16" height="14" rx="2"/><path d="M10 9l5 3-5 3z"/>',
  jarvis:'<rect x="7" y="7" width="10" height="10" rx="2"/><path d="M9 3v2M15 3v2M9 19v2M15 19v2M3 9h2M3 15h2M19 9h2M19 15h2"/>',
  workbuddy:'<rect x="3" y="8" width="18" height="11" rx="2"/><path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M3 13h18"/>',
  xhs:'<path d="M6 4h9a2 2 0 0 1 2 2v14H8a2 2 0 0 1-2-2z"/><path d="M10 4v16M13 9h2M13 13h2"/>',
  contracts:'<path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4M10 13h5M10 16h5"/>',
  lark:'<path d="M5 5h14v9H9l-4 4z"/><path d="M9 9.5h6M9 12h4"/>',
  cdx:'<path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z"/><path d="M19 19H6a2 2 0 0 1-2-2"/><path d="M9 7h6M9 10h4"/>',

   <div class="db">
     <h4>精通</h4>
     <div class="kv" style="border:0;padding-bottom:0"><span>等级(按真实用量)</span><b style="color:var(--mastery)">${masteryLabel(s)}</b></div>
     <div class="mbar"><i style="width:${masteryPct(s)}%"></i></div>
     <div class="kv"><span>最近使用</span><b>${s.lu===null?'从未使用':s.lu===0?'今天':s.lu+' 天前'}</b></div>
     <h4>来源与管理</h4>
     <div class="kv"><span>来源</span><b class="src"><span class="sdot" style="background:${sr.c};color:${sr.c}"></span>${sr.zh}${s.x?' · larksuite/cli':''}</b></div>
     <div class="kv"><span>管理方</span><b>${s.x?'外部托管 · 只读(lark-cli)':'本地管理 · 可编辑'}</b></div>
     <div class="kv"><span>更新</span><b>${s.x?'随 lark-cli 自动升级':up?'有上游更新 ↑':srcOf(s)==='github'?'比对 GitHub 上游':'本地自制'}</b></div>
     <h4>说明</h4>
     <div style="font-size:12.5px;color:var(--txt2);line-height:1.65">${s.n} —— ${GNAME[s.g]||s.g}流技能,由 AI 在对话中按需施放。${s.x?'飞书官方套件之一,覆盖飞书生态;此处只读,更新与卸载用 lark-cli / npx skills。':'真实说明读取自该技能的 SKILL.md(原型中略)。'}</div>
   </div>
   <div class="df">${s.x?`<div class="ro">${ic('lock')}外部技能 · 只读</div>`:`<button class="btn pri">${eq?ic('x',2.2)+'从技能栏收回':ic('bar',2.2)+'上主技能栏'}</button><button class="btn">${ic('up',2.2)}升级</button>`}</div>`;
  $('drawer').classList.add('open');$('scrim').classList.add('open');
}
function closeDrawer(){$('drawer').classList.remove('open');$('scrim').classList.remove('open');state.sel=null;}
$('scrim').onclick=closeDrawer;
$('content').onclick=e=>{const t=e.target;
  if(t.closest('.btn'))return; // 原型:按钮不冒泡去开抽屉(配上此组/升级 留作真实接线)
  if(t.closest('.hslot.empty')){state.view='cdx';buildNav();render();return;} // 空槽 → 去图鉴挑技能
  const cat=t.closest('[data-cat]');if(cat){state.cat=cat.dataset.cat;if(cat.dataset.src)state.src=cat.dataset.src;return render();}
  const src=t.closest('[data-src]');if(src){state.src=src.dataset.src;return render();}
  const item=t.closest('[data-n]');if(item)openDrawer(item.dataset.n);
};
buildNav();$('searchBox').style.display='block';render();
</script>
</body>
</html>
