<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkillHub Desktop — 原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ground:#08090A; --s1:#16171C; --s2:#1E1F25; --s3:#26272E;
  --hair:rgba(255,255,255,.06); --hair2:rgba(255,255,255,.10);
  --txt:#F7F8F8; --txt2:#9CA3AF; --txt3:#6B7280;
  --accent:#5E6AD2; --accent2:#8B93E8; --accent-soft:rgba(94,106,210,.14);
  --green:#4ade80; --yellow:#fbbf24; --red:#f87171; --cold:#7dd3fc;
  --r6:6px; --r12:12px; --r16:16px;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--ground);color:var(--txt);font:14px/1.55 'Inter',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;overflow:hidden;letter-spacing:.005em}
.mono{font-family:'JetBrains Mono',monospace}
.disp{font-family:'Inter Tight',sans-serif;letter-spacing:-.02em}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:#33343c}::-webkit-scrollbar-track{background:transparent}

/* 窗口外壳 */
.win{height:100vh;display:flex;flex-direction:column}
.titlebar{height:38px;flex:none;display:flex;align-items:center;gap:8px;padding:0 14px;
  background:var(--ground);border-bottom:1px solid var(--hair);-webkit-app-region:drag;user-select:none}
.lights{display:flex;gap:8px}.lights i{width:12px;height:12px;border-radius:50%}
.lights .r{background:#ff5f57}.lights .y{background:#febc2e}.lights .g{background:#28c840}
.tb-title{font-size:12.5px;color:var(--txt3);margin-left:6px;font-weight:500}
.tb-sync{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--txt3)}
.tb-sync .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.body{flex:1;display:flex;min-height:0}

/* 侧栏 */
.side{width:220px;flex:none;background:var(--ground);border-right:1px solid var(--hair);
  display:flex;flex-direction:column;padding:14px 10px}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
.logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#3b45a8);
  display:grid;place-items:center;box-shadow:0 1px 2px rgba(0,0,0,.4)}
.logo svg{width:15px;height:15px}
.brand b{font-size:14.5px;font-weight:600}.brand span{display:block;font-size:10.5px;color:var(--txt3);font-weight:400}
.nav{display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:11px;padding:8px 9px;border-radius:var(--r6);color:var(--txt2);
  cursor:pointer;font-size:13.5px;font-weight:450;transition:.13s var(--ease)}
.nav a svg{width:17px;height:17px;flex:none;opacity:.85}
.nav a:hover{background:var(--s1);color:var(--txt)}
.nav a.on{background:var(--accent-soft);color:#fff}
.nav a.on svg{opacity:1;color:var(--accent2)}
.nav .badge{margin-left:auto;font-size:11px;background:var(--s2);color:var(--txt2);padding:1px 7px;border-radius:20px}
.nav a.on .badge{background:var(--accent);color:#fff}
.side-foot{margin-top:auto;padding:10px 9px 4px;border-top:1px solid var(--hair)}
.side-foot .row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--txt3);margin-top:6px}
.side-foot b{color:var(--txt);font-weight:600}

/* 主区 */
.main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--ground)}
.topbar{flex:none;padding:18px 26px 14px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--hair)}
.h1{font-size:19px;font-weight:600}.h1 small{font-size:12.5px;color:var(--txt3);font-weight:400;margin-left:9px}
.search{margin-left:auto;position:relative;width:260px}
.search input{width:100%;background:var(--s1);border:1px solid var(--hair);border-radius:var(--r6);
  color:var(--txt);padding:7px 11px 7px 31px;font-size:13px;outline:none;transition:.13s}
.search input:focus{border-color:var(--accent);background:var(--s2)}
.search svg{position:absolute;left:9px;top:8px;width:15px;height:15px;color:var(--txt3)}
.btn{background:var(--s2);border:1px solid var(--hair2);color:var(--txt);padding:7px 13px;border-radius:var(--r6);
  font-size:13px;font-weight:500;cursor:pointer;transition:.13s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--s3)}
.btn.pri{background:var(--accent);border-color:transparent}.btn.pri:hover{background:#6d78d8}
.content{flex:1;overflow:auto;padding:18px 26px 40px}

/* 过滤条 */
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.chip{font-size:12.5px;color:var(--txt2);background:var(--s1);border:1px solid var(--hair);
  padding:5px 11px;border-radius:20px;cursor:pointer;transition:.12s;white-space:nowrap}
.chip:hover{color:var(--txt);border-color:var(--hair2)}
.chip.on{background:var(--accent-soft);color:#fff;border-color:transparent}
.chip .n{color:var(--txt3);margin-left:5px;font-size:11px}
.sep{width:1px;height:16px;background:var(--hair);margin:0 4px}

/* 卡片网格 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:12px}
.card{background:var(--s1);border:1px solid var(--hair);border-radius:var(--r12);padding:14px 15px;
  cursor:pointer;transition:.15s var(--ease);position:relative;overflow:hidden}
.card:hover{border-color:var(--hair2);background:var(--s2);transform:translateY(-1px)}
.card.sel{border-color:var(--accent);background:var(--s2)}
.card .cname{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:3px}
.gdot{width:7px;height:7px;border-radius:50%;flex:none}
.card .cdesc{font-size:12.5px;color:var(--txt2);line-height:1.5;height:38px;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin:6px 0 11px}
.tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pill{font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:5px;letter-spacing:.01em}
.pill.global{background:rgba(74,222,128,.13);color:var(--green)}
.pill.demand{background:var(--s3);color:var(--txt2)}
.pill.oss{background:var(--accent-soft);color:var(--accent2)}
.pill.cold{background:rgba(125,211,252,.12);color:var(--cold)}
.gtag{font-size:11px;color:var(--txt3);margin-left:auto}

/* 详情面板 */
.detail{position:fixed;top:38px;right:0;bottom:0;width:380px;background:var(--s1);border-left:1px solid var(--hair2);
  transform:translateX(100%);transition:.32s var(--ease);z-index:20;display:flex;flex-direction:column;
  box-shadow:-8px 0 40px rgba(0,0,0,.4)}
.detail.open{transform:none}
.dt-head{padding:20px 22px 16px;border-bottom:1px solid var(--hair)}
.dt-head .x{position:absolute;right:16px;top:16px;width:26px;height:26px;border-radius:6px;display:grid;place-items:center;
  color:var(--txt3);cursor:pointer}.dt-head .x:hover{background:var(--s3);color:var(--txt)}
.dt-name{font-size:18px;font-weight:600;letter-spacing:-.01em}
.dt-body{flex:1;overflow:auto;padding:18px 22px}
.dt-body h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin:18px 0 8px;font-weight:600}
.dt-body h4:first-child{margin-top:0}
.dt-desc{font-size:13px;color:var(--txt);line-height:1.6}
.kv{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--hair)}
.kv span{color:var(--txt3)}.kv b{font-weight:500}
.md{background:var(--ground);border:1px solid var(--hair);border-radius:var(--r6);padding:12px;font-size:12px;
  color:var(--txt2);line-height:1.6;max-height:160px;overflow:auto}
.md .mh{color:var(--txt);font-weight:600;font-family:'Inter Tight'}
.dt-foot{flex:none;padding:14px 22px;border-top:1px solid var(--hair);display:flex;gap:9px}
.dt-foot .btn{flex:1;justify-content:center}
.scrim{position:fixed;inset:38px 0 0 0;background:rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:.3s;z-index:15}
.scrim.open{opacity:1;pointer-events:auto}

/* 项目/统计/设置 通用块 */
.section-title{font-size:13px;font-weight:600;color:var(--txt);margin:22px 0 12px;display:flex;align-items:center;gap:9px}
.section-title:first-child{margin-top:0}
.section-title .c{font-size:11.5px;color:var(--txt3);font-weight:400}
.lo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:11px}
.lo{background:var(--s1);border:1px solid var(--hair);border-radius:var(--r12);padding:15px;transition:.14s}
.lo:hover{border-color:var(--hair2);background:var(--s2)}
.lo .ln{font-size:14px;font-weight:600;text-transform:capitalize}
.lo .lc{font-size:12px;color:var(--txt3);margin:4px 0 12px}
.lo .members{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.lo .members i{font-size:10.5px;background:var(--s3);color:var(--txt2);padding:2px 7px;border-radius:5px;font-style:normal}
.proj-pick{background:var(--s1);border:1px dashed var(--hair2);border-radius:var(--r12);padding:18px;
  display:flex;align-items:center;gap:14px;margin-bottom:6px}
.proj-pick .pp-ic{width:38px;height:38px;border-radius:9px;background:var(--s3);display:grid;place-items:center;color:var(--txt2)}
.proj-pick b{font-size:14px}.proj-pick p{font-size:12px;color:var(--txt3);margin-top:2px}
.recent{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.recent i{font-style:normal;font-size:12px;color:var(--txt2);background:var(--s1);border:1px solid var(--hair);
  padding:5px 10px;border-radius:6px;cursor:pointer}.recent i:hover{border-color:var(--accent);color:#fff}

/* 更新列表 */
.up-row{display:flex;align-items:center;gap:14px;padding:13px 15px;background:var(--s1);border:1px solid var(--hair);
  border-radius:var(--r12);margin-bottom:9px;transition:.13s}
.up-row:hover{background:var(--s2)}
.st{width:9px;height:9px;border-radius:50%;flex:none}
.st.green{background:var(--green);box-shadow:0 0 8px rgba(74,222,128,.5)}
.st.yellow{background:var(--yellow);box-shadow:0 0 8px rgba(251,191,36,.5)}
.st.red{background:var(--red)}
.st.idle{background:var(--s3)}
.up-row .un{font-size:13.5px;font-weight:500;min-width:160px}
.up-row .urepo{font-size:11.5px;color:var(--txt3);flex:1}
.up-row .ustat{font-size:11.5px;font-weight:500}
.us-green{color:var(--green)}.us-yellow{color:var(--yellow)}.us-idle{color:var(--txt3)}

/* 统计 */
.stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:6px}
.sc{background:var(--s1);border:1px solid var(--hair);border-radius:var(--r12);padding:16px}
.sc .v{font-size:26px;font-weight:600;font-family:'Inter Tight';letter-spacing:-.02em}
.sc .l{font-size:12px;color:var(--txt3);margin-top:3px}
.sc .v.cold{color:var(--cold)}
.tbl{width:100%;border-collapse:collapse;margin-top:6px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--txt3);
  font-weight:600;padding:8px 12px;border-bottom:1px solid var(--hair)}
.tbl td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--hair)}
.tbl tr:hover td{background:var(--s1)}
.note{font-size:11.5px;color:var(--txt3);background:var(--s1);border:1px solid var(--hair);border-radius:var(--r6);
  padding:8px 12px;margin-bottom:14px}

/* 设置 */
.set-row{display:flex;align-items:center;gap:16px;padding:15px 0;border-bottom:1px solid var(--hair)}
.set-row .si{flex:1}.set-row .si b{font-size:13.5px;font-weight:500}.set-row .si p{font-size:12px;color:var(--txt3);margin-top:2px}
.set-row .sv{font-size:12.5px;color:var(--txt2);font-family:'JetBrains Mono'}
.toggle{width:38px;height:22px;border-radius:20px;background:var(--s3);position:relative;cursor:pointer;flex:none;transition:.15s}
.toggle.on{background:var(--accent)}
.toggle i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.18s var(--ease)}
.toggle.on i{left:18px}
.agent-dot{width:18px;height:18px;border-radius:5px;display:inline-grid;place-items:center;font-size:9px;font-weight:600;
  background:var(--s3);color:var(--txt2)}
.adots{display:flex;gap:3px;margin-left:auto}
</style>
</head>

</div>

  </div>`).join('');
  return `<div class="filters">
    <span class="chip ${S.tier==='all'?'on':''}" onclick="setTier('all')">全部<span class="n">${HUB.skills.length}</span></span>
    <span class="chip ${S.tier==='global'?'on':''}" onclick="setTier('global')">常驻<span class="n">${HUB.stats.global}</span></span>
    <span class="chip ${S.tier==='on-demand'?'on':''}" onclick="setTier('on-demand')">按需<span class="n">${HUB.skills.length-HUB.stats.global}</span></span>
    <span class="sep"></span>
    <span class="chip ${S.group==='all'?'on':''}" onclick="setGroup('all')">全部分组</span>${groupChips}
  </div>
  <div class="grid">${cards||'<div style="color:var(--txt3);padding:40px">没有匹配的 skill</div>'}</div>`;
}
function setTier(t){S.tier=t;render()}function setGroup(g){S.group=g;render()}

function openDetail(name){const s=HUB.skills.find(x=>x.name===name);S.sel=name;render();
  const d=document.getElementById('detail');
  d.innerHTML=`<div class="dt-head"><div class="x" onclick="closeDetail()">✕</div>
    <div class="dt-name disp"><span class="gdot" style="background:${GCOLOR[s.group]};display:inline-block;margin-right:8px"></span>${s.name}</div>
    <div class="tags" style="margin-top:10px">${tierPill(s)}${s.oss?'<span class="pill oss">OSS</span>':''}<span class="gtag" style="margin-left:0">${s.group}</span></div></div>
   <div class="dt-body">
     <h4>描述</h4><div class="dt-desc">${esc(s.desc)}</div>
     <h4>属性</h4>
     <div class="kv"><span>分层</span><b>${s.tier==='global'?'常驻(global) — 自动软链进各 agent':'按需(on-demand)'}</b></div>
     <div class="kv"><span>分发 agent</span><b>${(s.agents||[]).join(' · ')}</b></div>
     ${s.oss?`<div class="kv"><span>upstream</span><b class="mono" style="font-size:11px">${s.repo.replace('github.com/','')}</b></div>`:''}
     <div class="kv"><span>最近使用</span><b>${s.lastUsed===null?'未用过':s.lastUsed+' 天前'}</b></div>
     <h4>SKILL.md 预览</h4>
     <div class="md"><div class="mh"># ${s.name}</div><br>${esc(s.desc)}<br><br><span style="color:var(--txt3)">## 用法 / references 在此渲染…</span></div>
   </div>
   <div class="dt-foot">
     <button class="btn ${s.tier==='global'?'':'pri'}">${s.tier==='global'?'转为按需':'设为常驻'}</button>
     <button class="btn">装入项目…</button>
   </div>`;
  d.classList.add('open');document.getElementById('scrim').classList.add('open');
}
function closeDetail(){document.getElementById('detail').classList.remove('open');document.getElementById('scrim').classList.remove('open');if(S.sel){S.sel=null;if(S.view==='catalog')render()}}
document.getElementById('scrim').addEventListener('click',closeDetail);

function projectsView(){
  const los=Object.entries(HUB.loadouts).map(([n,m])=>`<div class="lo">
    <div class="ln">${n}</div><div class="lc">${m.length} 个 skill</div>
    <div class="members">${m.slice(0,4).map(x=>`<i>${x}</i>`).join('')}${m.length>4?`<i>+${m.length-4}</i>`:''}</div>
    <button class="btn pri" style="width:100%;justify-content:center">一键装入当前项目</button></div>`).join('');
  return `<div class="proj-pick"><div class="pp-ic">${icon('folder')}</div>
     <div style="flex:1"><b>当前项目:<span class="mono" style="font-weight:500"> ~/WorkSpace/jarvis</span></b><p>已装 11 个按需 skill · 软链进 .claude / .codex / .cursor</p></div>
     <button class="btn">切换项目…</button></div>
   <div class="recent">最近: <i>jarvis</i><i>seewow</i><i>bbwy-app</i><i>skillhub-desktop</i></div>
   <div class="section-title">Loadout 预设 <span class="c">选一套,一键装进项目</span></div>
   <div class="lo-grid">${los}</div>`;
}
function updatesView(){
  const oss=HUB.skills.filter(s=>s.oss);
  // 示例:给两个标记有更新
  const upd={'humanizer':['green','有新版本 · 纯提示词增强 → 自动更新'],'guizang-ppt-skill':['yellow','有新版本 · diff 较大 → 待你定夺']};
  const rows=oss.map(s=>{const u=upd[s.name];const st=u?u[0]:'idle';const tx=u?u[1]:'已是最新';
    return `<div class="up-row"><span class="st ${st}"></span>
      <span class="un">${s.name}</span><span class="urepo mono">${s.repo.replace('github.com/','')}</span>
      <span class="ustat us-${st==='idle'?'idle':(st==='green'?'green':'yellow')}">${tx}</span>
      ${u?`<button class="btn ${st==='green'?'pri':''}" style="padding:5px 11px">${st==='green'?'更新':'查看 diff'}</button>`:''}</div>`}).join('');
  return `<div class="note">每周一 10:00 自动检查。<b style="color:var(--green)">green</b> 自动更并提交 · <b style="color:var(--yellow)">yellow</b> 待你定夺 · <b style="color:var(--red)">red</b> 自动拒。结果飞书通知 yihu。</div>
    <div class="section-title">开源 skill <span class="c">${oss.length} 个跟踪中 · 2 个有更新</span></div>${rows}`;
}
function statsView(){
  const cold=HUB.skills.filter(s=>s.lastUsed===null||s.lastUsed>=90);
  const used=HUB.skills.filter(s=>s.lastUsed!==null).sort((a,b)=>a.lastUsed-b.lastUsed).slice(0,8);
  return `<div class="note">用量从 PostToolUse hook 启用起累计;下表为<b>示例数据</b>用于展示界面。</div>
   <div class="stat-cards">
    <div class="sc"><div class="v">${HUB.skills.length}</div><div class="l">总 skill</div></div>
    <div class="sc"><div class="v">${HUB.stats.global}</div><div class="l">常驻 global</div></div>
    <div class="sc"><div class="v cold">${cold.length}</div><div class="l">冷门(可删)</div></div>
    <div class="sc"><div class="v">${HUB.stats.oss}</div><div class="l">开源跟踪</div></div></div>
   <div class="section-title">❄️ 冷门清单 <span class="c">${cold.length} 个 · 90 天未用或从未用过 → 删除候选</span></div>
   <table class="tbl"><thead><tr><th>Skill</th><th>分组</th><th>最近使用</th><th></th></tr></thead><tbody>
   ${cold.slice(0,12).map(s=>`<tr><td><span class="gdot" style="background:${GCOLOR[s.group]};display:inline-block;margin-right:8px"></span>${s.name}</td><td style="color:var(--txt3)">${s.group}</td><td style="color:var(--cold)">${s.lastUsed===null?'未用过':s.lastUsed+' 天前'}</td><td><button class="btn" style="padding:4px 10px;font-size:12px">删除</button></td></tr>`).join('')}
   </tbody></table>`;
}
function settingsView(){
  const sr=(b,p,v,tog)=>`<div class="set-row"><div class="si"><b>${b}</b><p>${p}</p></div>${v?`<span class="sv">${v}</span>`:''}${tog!==undefined?`<div class="toggle ${tog?'on':''}"><i></i></div>`:''}</div>`;
  return `<div style="max-width:680px">
   <div class="section-title">仓库与目录</div>
   ${sr('Hub 路径','单一源 git 仓库','~/skills')}
   ${sr('GitHub 远端','跨设备同步','ivesyi/skill-hub')}
   <div class="set-row"><div class="si"><b>分发到 agent</b><p>global skill 软链进这些目录</p></div>
     <div class="adots"><span class="agent-dot" style="background:var(--accent-soft);color:var(--accent2)">CC</span><span class="agent-dot" style="background:var(--accent-soft);color:var(--accent2)">CX</span><span class="agent-dot" style="background:var(--accent-soft);color:var(--accent2)">CU</span></div></div>
   <div class="section-title">自动化</div>
   ${sr('每周自动更新','周一 10:00 · headless claude 按策略判定','launchd',true)}
   ${sr('飞书通知','更新周报发给 yihu','lark-cli',true)}
   ${sr('用量统计 hook','记录 skill 实际调用','PostToolUse',true)}
   <div class="section-title">同步</div>
   ${sr('改动后自动提交推送','操作后自动 git push','',false)}
   <div style="margin-top:18px;display:flex;gap:10px"><button class="btn pri">立即 git push</button><button class="btn">新设备复刻(skillctl link)</button></div>
  </div>`;
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
render();
</script>
</body>
</html>
